<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <title>Wolfpack</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0d1117;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        padding: 12px 16px;
        background: #161b22;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 48px;
        flex-shrink: 0;
        border-bottom: 1px solid #30363d;
      }
      header h1 {
        font-size: 16px;
        font-weight: 600;
        flex: 1;
      }
      .back-btn {
        display: none;
        background: none;
        border: none;
        color: #e0e0e0;
        font-size: 22px;
        cursor: pointer;
        padding: 4px 8px;
      }

      .view {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .view.visible {
        display: flex;
      }

      .list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .card:active {
        background: #1c2330;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.green {
        background: #3fb950;
      }
      .dot.blue {
        background: #58a6ff;
      }
      .dot.gray {
        background: #484f58;
      }
      .card-name {
        font-size: 15px;
        font-weight: 500;
        font-family: "SF Mono", monospace;
      }
      .card-preview {
        font-size: 12px;
        color: #8b949e;
        font-family: "SF Mono", monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-sub {
        font-size: 12px;
        color: #484f58;
        margin-left: auto;
      }

      .new-btn {
        background: #238636;
        border: 1px solid #2ea043;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        -webkit-tap-highlight-color: transparent;
      }
      .new-btn:active {
        background: #2ea043;
      }

      #terminal {
        flex: 1;
        overflow-y: auto;
        padding: 8px 10px;
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre;
        color: #c9d1d9;
        background: #0d1117;
        -webkit-overflow-scrolling: touch;
      }

      #action-bar {
        display: none;
        gap: 6px;
        padding: 6px 10px;
        background: #161b22;
        border-top: 1px solid #30363d;
        flex-wrap: wrap;
      }
      #action-bar.visible {
        display: flex;
      }
      .action-btn {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 14px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: "SF Mono", monospace;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .action-btn:active {
        background: #30363d;
      }
      .action-btn.primary {
        background: #238636;
        border-color: #2ea043;
        color: #fff;
      }
      .action-btn.danger {
        background: #da3633;
        border-color: #f85149;
        color: #fff;
      }

      #input-bar {
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        background: #161b22;
        border-top: 1px solid #30363d;
        flex-shrink: 0;
      }
      #input-bar textarea {
        flex: 1;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 16px;
        font-family: "SF Mono", monospace;
        outline: none;
        resize: none;
        overflow-y: hidden;
        min-height: 36px;
        max-height: 120px;
        line-height: 1.4;
      }
      #input-bar textarea:focus {
        border-color: #58a6ff;
      }
      #input-bar button {
        background: #238636;
        border: none;
        border-radius: 6px;
        width: 40px;
        color: white;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        align-self: flex-end;
      }
      .newline-btn {
        background: #21262d !important;
        border: 1px solid #30363d !important;
        color: #8b949e !important;
        font-size: 12px !important;
        width: 32px !important;
        align-self: flex-end;
      }

      .new-project-row {
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
      }
      .new-project-row input {
        flex: 1;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 15px;
        font-family: "SF Mono", monospace;
        outline: none;
      }
      .new-project-row input:focus {
        border-color: #58a6ff;
      }
      .new-project-row button {
        background: #238636;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .empty {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #484f58;
      }

      .settings-section {
        padding: 12px;
      }
      .settings-label {
        font-size: 13px;
        color: #8b949e;
        margin-bottom: 8px;
      }
      .preset-btn {
        display: block;
        width: 100%;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 6px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: "SF Mono", monospace;
        text-align: left;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .preset-btn:active {
        background: #1c2330;
      }
      .preset-btn.selected {
        border-color: #3fb950;
        color: #3fb950;
      }
      .custom-cmd-row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .custom-cmd-row input {
        flex: 1;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 10px 12px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: "SF Mono", monospace;
        outline: none;
      }
      .custom-cmd-row input:focus {
        border-color: #58a6ff;
      }
      .custom-cmd-row button {
        background: #238636;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
      .session-select {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: "SF Mono", monospace;
        padding: 2px 6px;
        outline: none;
        max-width: 180px;
        -webkit-appearance: none;
        appearance: none;
      }
      .scroll-toggle {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 16px;
        cursor: pointer;
        padding: 4px;
      }
      .scroll-toggle.active {
        color: #3fb950;
      }
      .kill-btn {
        background: none;
        border: none;
        color: #f85149;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        margin-left: auto;
        -webkit-tap-highlight-color: transparent;
      }
      .settings-gear {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 20px;
        cursor: pointer;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <button class="back-btn" id="back-btn">&larr;</button>
      <h1 id="header-title">wolfpack</h1>
      <select
        id="session-switcher"
        class="session-select"
        style="display: none"
        onchange="switchSession(this.value)"
      ></select>
      <button
        class="scroll-toggle"
        id="scroll-toggle"
        style="display: none"
        onclick="toggleHistory()"
        title="Scroll back"
      >
        &#8593;
      </button>
      <button class="settings-gear" id="gear-btn" onclick="showSettings()">
        &#9881;
      </button>
    </header>

    <!-- Sessions view -->
    <div id="sessions-view" class="view visible">
      <div id="session-list" class="list"></div>
    </div>

    <!-- Project picker view -->
    <div id="projects-view" class="view">
      <div class="new-project-row">
        <input
          id="new-project-name"
          type="text"
          placeholder="new project name..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        />
        <button onclick="createNewProject()">Create</button>
      </div>
      <div id="project-list" class="list"></div>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="view">
      <div class="settings-section">
        <div class="settings-label">Agent Command</div>
        <div id="preset-list"></div>
        <div class="settings-label" style="margin-top: 16px">
          Custom Command
        </div>
        <div class="custom-cmd-row">
          <input
            id="custom-cmd"
            type="text"
            placeholder="e.g. aider --model gpt-4o"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          />
          <button onclick="saveCustomCmd()">Save</button>
        </div>
      </div>
    </div>

    <!-- Terminal view -->
    <div id="terminal-view" class="view">
      <div
        id="conn-status"
        style="
          display: none;
          background: #da3633;
          color: #fff;
          text-align: center;
          padding: 6px;
          font-size: 13px;
          flex-shrink: 0;
        "
      >
        Reconnecting...
      </div>
      <div id="terminal"></div>
      <div id="action-bar">
        <button class="action-btn" onclick="sendKey('Tab')">Tab</button>
        <button class="action-btn" onclick="sendKey('BTab')">⇧Tab</button>
        <button class="action-btn" onclick="sendKey('Enter')">Enter</button>
        <button class="action-btn" onclick="sendKey('Escape')">Esc</button>
        <button class="action-btn" onclick="sendKey('Up')">↑</button>
        <button class="action-btn" onclick="sendKey('Down')">↓</button>
        <button class="action-btn" onclick="sendKey('y')">y</button>
        <button class="action-btn" onclick="sendKey('n')">n</button>
        <button class="action-btn danger" onclick="sendKey('C-c')">^C</button>
      </div>
      <div id="input-bar">
        <button
          class="action-btn"
          id="toggle-bar"
          onclick="toggleActionBar()"
          style="width: 40px; padding: 8px 0"
        >
          ⌨
        </button>
        <textarea
          id="msg-input"
          rows="1"
          placeholder="$ "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <button class="newline-btn" onclick="insertNewline()">↵</button>
        <button onclick="sendMsg()">&#9654;</button>
      </div>
    </div>

    <script>
      const BASE = "/api";
      let currentSession = null;
      let currentView = "sessions";
      let pollTimer = null;
      let showHistory = false;
      let allSessions = [];

      async function api(path, opts) {
        const res = await fetch(BASE + path, opts);
        return res.json();
      }

      function showView(name) {
        currentView = name;
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("visible"));
        document.getElementById(name + "-view").classList.add("visible");

        const back = document.getElementById("back-btn");
        const title = document.getElementById("header-title");

        const gear = document.getElementById("gear-btn");

        const switcher = document.getElementById("session-switcher");
        const scrollBtn = document.getElementById("scroll-toggle");

        switcher.style.display = "none";
        scrollBtn.style.display = "none";

        if (name === "sessions") {
          back.style.display = "none";
          back.onclick = null;
          gear.style.display = "";
          title.textContent = "wolfpack";
        } else if (name === "projects") {
          back.style.display = "block";
          back.onclick = () => {
            stopPolling();
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "new session";
        } else if (name === "settings") {
          back.style.display = "block";
          back.onclick = () => {
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "settings";
        } else if (name === "terminal") {
          back.style.display = "block";
          back.onclick = () => {
            stopPolling();
            currentSession = null;
            showHistory = false;
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "";
          switcher.style.display = "";
          scrollBtn.style.display = "";
          loadSessionSwitcher();
        }
      }

      // ── Sessions ──

      async function loadSessions() {
        const el = document.getElementById("session-list");
        try {
          const data = await api("/sessions");
          allSessions = data.sessions || [];
          let html =
            '<div class="new-btn" onclick="showProjectPicker()">+ New Session</div>';
          if (data.sessions?.length) {
            html += data.sessions
              .map(
                (s) => `
        <div class="card" onclick="openSession('${esc(s.name)}')">
          <div class="dot green"></div>
          <div class="card-info">
            <div class="card-name">${esc(s.name)}</div>
            <div class="card-preview">${esc(s.lastLine || "")}</div>
          </div>
          <button class="kill-btn" onclick="killSession('${esc(s.name)}', event)">&times;</button>
        </div>
      `,
              )
              .join("");
          }
          el.innerHTML = html;
        } catch (e) {
          el.innerHTML = '<div class="empty">Failed to connect</div>';
        }
      }

      function openSession(name) {
        currentSession = name;
        showView("terminal");
        document.getElementById("terminal").textContent = "";
        resizePane();
        startPolling();
      }

      async function resizePane() {
        if (!currentSession) return;
        const term = document.getElementById("terminal");
        // Measure character size using a hidden span
        const probe = document.createElement("span");
        probe.style.cssText =
          'position:absolute;visibility:hidden;white-space:pre;font:11px/1.4 "SF Mono","Menlo","Consolas",monospace';
        probe.textContent = "X";
        document.body.appendChild(probe);
        const charW = probe.offsetWidth;
        const charH = probe.offsetHeight;
        document.body.removeChild(probe);
        if (!charW || !charH) return;
        const cols = Math.floor(term.clientWidth / charW);
        const rows = Math.floor(term.clientHeight / charH);
        if (cols > 0 && rows > 0) {
          await api("/resize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, cols, rows }),
          });
        }
      }

      // ── Project picker ──

      async function showProjectPicker() {
        showView("projects");
        document.getElementById("new-project-name").value = "";
        const el = document.getElementById("project-list");
        el.innerHTML = '<div class="empty">Loading...</div>';

        try {
          const data = await api("/projects");
          if (!data.projects?.length) {
            el.innerHTML = '<div class="empty">No projects in ~/Dev</div>';
            return;
          }
          el.innerHTML = data.projects
            .map(
              (p) => `
      <div class="card" onclick="createSession('${esc(p)}')">
        <div class="dot blue"></div>
        <div class="card-name">${esc(p)}</div>
      </div>
    `,
            )
            .join("");
        } catch {
          el.innerHTML = '<div class="empty">Failed to load projects</div>';
        }
      }

      async function createSession(project) {
        try {
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project }),
          });
          if (data.session) {
            openSession(data.session);
          }
        } catch {}
      }

      async function createNewProject() {
        const input = document.getElementById("new-project-name");
        const name = input.value.trim();
        if (!name) return;
        try {
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newProject: name }),
          });
          if (data.session) {
            openSession(data.session);
          }
        } catch {}
      }

      // ── Terminal ──

      function startPolling() {
        poll();
        pollTimer = setInterval(poll, 1000);
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      let pollFails = 0;

      async function poll() {
        if (!currentSession) return;
        try {
          const histParam = showHistory ? "&history=1" : "";
          const data = await api(
            "/poll?session=" + encodeURIComponent(currentSession) + histParam,
          );
          pollFails = 0;
          const term = document.getElementById("terminal");
          const statusEl = document.getElementById("conn-status");
          if (statusEl) statusEl.style.display = "none";
          if (data.pane != null) {
            const wasAtBottom =
              term.scrollHeight - term.scrollTop - term.clientHeight < 40;
            term.textContent = data.pane;
            if (wasAtBottom) term.scrollTop = term.scrollHeight;
            checkForAttention(data.pane);
          }
        } catch {
          pollFails++;
          if (pollFails >= 3) {
            const statusEl = document.getElementById("conn-status");
            if (statusEl) statusEl.style.display = "block";
          }
        }
      }

      async function sendMsg() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text || !currentSession) return;
        input.value = "";
        autoGrow(input);
        // Multi-line: send each line with noEnter, then Enter between
        const lines = text.split("\n");
        if (lines.length === 1) {
          await api("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, text }),
          });
        } else {
          for (let i = 0; i < lines.length; i++) {
            if (lines[i]) {
              await api("/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  session: currentSession,
                  text: lines[i],
                  noEnter: true,
                }),
              });
            }
            await api("/key", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session: currentSession, key: "Enter" }),
            });
          }
        }
      }

      function autoGrow(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }

      function insertNewline() {
        const input = document.getElementById("msg-input");
        const start = input.selectionStart;
        input.value =
          input.value.slice(0, start) +
          "\n" +
          input.value.slice(input.selectionEnd);
        input.selectionStart = input.selectionEnd = start + 1;
        autoGrow(input);
        input.focus();
      }

      async function sendKey(key) {
        if (!currentSession) return;
        await api("/key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: currentSession, key }),
        });
      }

      function toggleActionBar() {
        document.getElementById("action-bar").classList.toggle("visible");
      }

      async function killSession(name, e) {
        e.stopPropagation();
        if (!confirm(`Kill session "${name}"?`)) return;
        await api("/kill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: name }),
        });
        loadSessions();
      }

      async function loadSessionSwitcher() {
        try {
          const data = await api("/sessions");
          allSessions = data.sessions || [];
          const sel = document.getElementById("session-switcher");
          sel.innerHTML = allSessions
            .map(
              (s) =>
                `<option value="${esc(s.name)}" ${s.name === currentSession ? "selected" : ""}>${esc(s.name)}</option>`,
            )
            .join("");
        } catch {}
      }

      function switchSession(name) {
        if (name === currentSession) return;
        stopPolling();
        showHistory = false;
        document.getElementById("scroll-toggle").classList.remove("active");
        currentSession = name;
        document.getElementById("terminal").textContent = "";
        resizePane();
        startPolling();
      }

      function toggleHistory() {
        showHistory = !showHistory;
        document
          .getElementById("scroll-toggle")
          .classList.toggle("active", showHistory);
        poll(); // immediate refresh
      }

      // ── Notifications ──

      let notificationsEnabled = false;
      let lastPaneText = "";

      function requestNotifications() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().then((p) => {
            notificationsEnabled = p === "granted";
          });
        } else if (
          "Notification" in window &&
          Notification.permission === "granted"
        ) {
          notificationsEnabled = true;
        }
      }

      const ATTENTION_PATTERNS = [
        /\? \(y\/n\)/i,
        /\[Y\/n\]/i,
        /\[yes\/no\]/i,
        /Do you want to/i,
        /Press Enter/i,
        /permission/i,
        /approve/i,
        /waiting for/i,
        /Error:/i,
        /error\[/i,
        /failed/i,
        /❌/,
      ];

      function checkForAttention(paneText) {
        if (!notificationsEnabled || !currentSession) return;
        if (document.visibilityState === "visible") return; // don't notify if looking at it

        const lastLines = paneText.trimEnd().split("\n").slice(-5).join("\n");
        if (lastLines === lastPaneText) return;
        lastPaneText = lastLines;

        for (const pat of ATTENTION_PATTERNS) {
          if (pat.test(lastLines)) {
            new Notification(`Wolfpack: ${currentSession}`, {
              body: lastLines.slice(-120),
              tag: "wolfpack-attention", // collapse duplicates
            });
            break;
          }
        }
      }

      requestNotifications();

      document.getElementById("msg-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMsg();
        }
      });
      document.getElementById("msg-input").addEventListener("input", (e) => {
        autoGrow(e.target);
      });

      document
        .getElementById("new-project-name")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") createNewProject();
        });

      // ── Settings ──

      async function showSettings() {
        showView("settings");
        const el = document.getElementById("preset-list");
        el.innerHTML = "";
        try {
          const data = await api("/settings");
          const current = data.settings?.agentCmd || "claude";
          document.getElementById("custom-cmd").value = current;

          const presets = Object.entries(data.presets || {});
          el.innerHTML = presets
            .map(
              ([label, cmd]) => `
      <button class="preset-btn ${cmd === current ? "selected" : ""}" onclick="selectPreset('${esc(cmd)}')">${esc(label)}</button>
    `,
            )
            .join("");
        } catch {}
      }

      async function selectPreset(cmd) {
        await api("/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentCmd: cmd }),
        });
        showSettings(); // refresh
      }

      async function saveCustomCmd() {
        const cmd = document.getElementById("custom-cmd").value.trim();
        if (!cmd) return;
        await api("/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentCmd: cmd }),
        });
        showSettings();
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      loadSessions();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js", { scope: "/" });
      }
    </script>
  </body>
</html>
