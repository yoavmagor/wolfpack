          e.preventDefault();
          sendKey("Down");
        }
      });

      // Global arrow keys → tmux when in terminal and textarea not focused
      document.addEventListener("keydown", (e) => {
        if (currentView !== "terminal") return;
        if (useDesktopTerminal) return; // desktop terminal has its own handler
        const tag = document.activeElement && document.activeElement.tagName;
        if (document.activeElement === msgInput || tag === "SELECT" || tag === "INPUT") return;
        const keyMap = { ArrowUp: "Up", ArrowDown: "Down", ArrowLeft: "Left", ArrowRight: "Right", Enter: "Enter", Escape: "Escape" };
        const mapped = keyMap[e.key];
        if (mapped) { e.preventDefault(); sendKey(mapped); }
      });

      document
        .getElementById("new-project-name")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") selectNewProject();
        });

      // ── Settings ──

      async function showSettings() {
        showView("settings");
        renderMachinesList();
      }

      async function renderMachinesList() {
        const machines = getMachines();
        const el = document.getElementById("machines-list");
        if (!machines.length) {
          el.innerHTML = '<div style="color:#444;font-size:12px;padding:6px 0">No remote machines added</div>';
          return;
        }
        // Check status of each machine
        const checks = await Promise.all(machines.map(m =>
          fetch(m.url + "/api/info", { signal: AbortSignal.timeout(3000) })
            .then(() => true).catch(() => false)
        ));
        el.innerHTML = machines.map((m, i) => {
          const dot = checks[i] ? "green" : "red";
          return `<div class="machine-item">
            <div class="dot ${dot}"></div>
            <span class="machine-item-name">${esc(m.name)}<span class="machine-item-url">${esc(m.url)}</span></span>
            <button class="machine-remove-btn" onclick="removeMachineUI('${escAttr(m.url)}')">&times;</button>
          </div>`;
        }).join("");
      }

      function removeMachineUI(url) {
        removeMachine(url);
        renderMachinesList();
      }

      async function discoverMachines() {
        const statusEl = document.getElementById("discover-status");
        statusEl.textContent = "Scanning tailnet...";
        statusEl.style.color = "#555";
        try {
          const data = await api("/discover");
          if (data.error) {
            statusEl.textContent = data.error;
            statusEl.style.color = "#cc3333";
            return;
          }
          const peers = data.peers || [];
          if (!peers.length) {
            statusEl.textContent = "No wolfpack instances found on tailnet";
            statusEl.style.color = "#555";
            return;
          }
          const machines = getMachines();
          let added = 0;
          for (const p of peers) {
            if (!machines.some(m => m.url === p.url)) {
              machines.push({ url: p.url, name: p.name || p.hostname });
              added++;
            }
          }
          if (added > 0) {
            saveMachines(machines);
            renderMachinesList();
          }
          statusEl.textContent = added > 0
            ? `Found ${peers.length}, added ${added} new`
            : `Found ${peers.length}, all already added`;
          statusEl.style.color = "#00ff41";
        } catch {
          statusEl.textContent = "Discovery failed";
          statusEl.style.color = "#cc3333";
        }
      }

      // ── Search ──

      let searchActive = false;
      let searchTerm = "";
      let searchMatches = [];
      let searchIndex = -1;
      let lastRawPane = null;

      function toggleSearch() {
        const bar = document.getElementById("search-bar");
        if (searchActive) {
          closeSearch();
        } else {
          searchActive = true;
          bar.classList.add("visible");
          document.getElementById("search-input").focus();
        }
      }

      function closeSearch() {
        searchActive = false;
        searchTerm = "";
        searchMatches = [];
        searchIndex = -1;
        document.getElementById("search-bar").classList.remove("visible");
        document.getElementById("search-input").value = "";
        document.getElementById("search-count").textContent = "";
        if (useDesktopTerminal) {
          const pre = document.getElementById("desktop-terminal");
          if (desktopRawAnsi && desktopAnsiUp) pre.innerHTML = desktopAnsiUp.ansi_to_html(desktopRawAnsi);
        } else {
          const term = document.getElementById("terminal");
          if (lastRawPane) term.textContent = lastRawPane;
        }
      }

      function doSearch() {
        searchTerm = document.getElementById("search-input").value;
        if (!searchTerm) {
          document.getElementById("search-count").textContent = "";
          if (useDesktopTerminal) {
            const pre = document.getElementById("desktop-terminal");
            if (desktopRawAnsi && desktopAnsiUp) pre.innerHTML = desktopAnsiUp.ansi_to_html(desktopRawAnsi);
          } else {
            const term = document.getElementById("terminal");
            if (lastRawPane) term.textContent = lastRawPane;
          }
          searchMatches = [];
          searchIndex = -1;
          return;
        }
        searchIndex = 0;
        applySearchHighlights();
      }

      function applySearchHighlights() {
        if (useDesktopTerminal) {
          applyDesktopSearchHighlights();
          return;
        }
        const term = document.getElementById("terminal");
        if (!searchTerm || !lastRawPane) return;
        const escaped = lastRawPane.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const re = new RegExp(escapedTerm.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"), "gi");
        let count = 0;
        let current = searchIndex;
        const html = escaped.replace(re, (m) => {
          const cls = count === current ? "search-current" : "";
          count++;
          return `<mark class="${cls}">${m}</mark>`;
        });
        searchMatches = Array.from({ length: count });
        if (count > 0 && searchIndex >= count) searchIndex = 0;
        document.getElementById("search-count").textContent = count > 0 ? `${searchIndex + 1}/${count}` : "0/0";
        term.innerHTML = html;
        const cur = term.querySelector("mark.search-current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      // Search highlighting for desktop terminal (preserves AnsiUp <span> colors)
      // Uses TreeWalker to find and wrap text matches without breaking HTML structure.
      function applyDesktopSearchHighlights() {
        const pre = document.getElementById("desktop-terminal");
        if (!searchTerm || !desktopRawAnsi || !desktopAnsiUp) return;

        // Re-render from raw ANSI to get clean HTML (removes prior <mark> tags)
        pre.innerHTML = desktopAnsiUp.ansi_to_html(desktopRawAnsi);

        const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const re = new RegExp(escapedTerm, "gi");

        // Collect all text nodes
        const walker = document.createTreeWalker(pre, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        let count = 0;
        for (const node of textNodes) {
          const parts = [];
          let text = node.textContent;
          let lastIdx = 0;
          let m;
          re.lastIndex = 0;
          while ((m = re.exec(text)) !== null) {
            if (m.index > lastIdx) {
              parts.push(document.createTextNode(text.slice(lastIdx, m.index)));
            }
            const mark = document.createElement("mark");
            if (count === searchIndex) mark.className = "search-current";
            mark.textContent = m[0];
            parts.push(mark);
            count++;
            lastIdx = re.lastIndex;
          }
          if (parts.length > 0) {
            if (lastIdx < text.length) {
              parts.push(document.createTextNode(text.slice(lastIdx)));
            }
            const frag = document.createDocumentFragment();
            parts.forEach(p => frag.appendChild(p));
            node.parentNode.replaceChild(frag, node);
          }
        }

        searchMatches = Array.from({ length: count });
        if (count > 0 && searchIndex >= count) searchIndex = 0;
        document.getElementById("search-count").textContent = count > 0 ? `${searchIndex + 1}/${count}` : "0/0";
        const cur = pre.querySelector("mark.search-current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      function nextMatch() {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex + 1) % searchMatches.length;
        applySearchHighlights();
      }

      function prevMatch() {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
        applySearchHighlights();
      }

      async function closeSession() {
        const session = currentSession;
        const machine = currentMachine;
        if (useDesktopTerminal) {
          destroyDesktopTerminal();
        } else {
          stopPolling();
        }
        useDesktopTerminal = false;
        closeSearch();
        currentSession = null;
        currentMachine = "";
        showView("sessions");
        if (session) {
          await api("/kill", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session }),
          }, machine);
        }
        loadSessions();
      }

      function confirmKillSession() {
        if (confirm(`Kill session "${currentSession}"?`)) {
          closeSession();
        }
      }

      document.getElementById("search-input").addEventListener("input", doSearch);
      document.getElementById("search-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSearch();
        else if (e.key === "Enter") {
          e.preventDefault();
          if (e.shiftKey) prevMatch(); else nextMatch();
        }
      });

      function esc(s) {
        if (s == null) return "";
        const d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
      }

      // JS-safe escaper for use inside onclick="func('...')" attribute contexts.
      // Backslash-escapes characters that could break out of a JS string literal
      // AFTER HTML attribute decoding.
      function escAttr(s) {
        if (s == null) return "";
        return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '\\"')
          .replace(/</g, "\\x3c").replace(/>/g, "\\x3e").replace(/&/g, "\\x26");
      }

      showView("sessions");
      loadSessions();

      // Register service worker for offline caching
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
