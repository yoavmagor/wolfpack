        // Build final HTML, only touch DOM if changed
        const html = groups.map(g => renderGroupHtml(g)).join("");
        if (html !== lastSessionsHtml) {
          el.innerHTML = html;
          lastSessionsHtml = html;
        }

        firstLoad = false;
        lastSessionGroups = groups;
        allSessions = [];
        groups.forEach(g => g.sessions.forEach(s => allSessions.push({ ...s, machineUrl: g.machine.url, machineName: g.machine.name })));
      }

      function openSession(name, machineUrl) {
        currentSession = name;
        currentMachine = machineUrl || "";
        lastRawPane = null;
        useDesktopTerminal = isDesktop();
        showView("terminal");
        if (useDesktopTerminal) {
          initDesktopTerminal();
        } else {
          // don't clear terminal — let first poll replace content seamlessly
          resizePane();
          startPolling();
        }
      }

      async function resizePane() {
        if (!currentSession) return;
        const term = document.getElementById("terminal");
        const probe = document.createElement("span");
        probe.style.cssText =
          'position:absolute;visibility:hidden;white-space:pre;font-size:12px;line-height:1.4;font-family:inherit';
        probe.textContent = "X";
        document.body.appendChild(probe);
        const charW = probe.offsetWidth;
        const charH = probe.offsetHeight;
        document.body.removeChild(probe);
        if (!charW || !charH) return;
        const cols = Math.floor(term.clientWidth / charW);
        const rows = Math.floor(term.clientHeight / charH);
        if (cols > 0 && rows > 0) {
          await api("/resize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, cols, rows }),
          }, currentMachine);
        }
      }

      // ── Project picker ──

      let projectMachine = ""; // machine URL for project picker context

      async function showProjectPicker(machineUrl) {
        projectMachine = machineUrl || "";
        showView("projects");
        document.getElementById("new-project-name").value = "";
        const el = document.getElementById("project-list");
        el.innerHTML = '<div class="empty">Loading...</div>';

        try {
          const data = await api("/projects", undefined, projectMachine);
          if (!data.projects?.length) {
            el.innerHTML = '<div class="empty">No projects in ~/Dev</div>';
            return;
          }
          el.innerHTML = data.projects
            .map(
              (p) => `
      <div class="card" onclick="selectProject('${escAttr(p)}')">
        <div class="dot blue"></div>
        <div class="card-name">${esc(p)}</div>
      </div>
    `,
            )
            .join("");
        } catch {
          el.innerHTML = '<div class="empty">Failed to load projects</div>';
        }
      }

      function showTerminalLoading(label) {
        showView("terminal");
        const term = document.getElementById("terminal");
        term.innerHTML = '<span class="loading-text">Starting session in ' + esc(label) + '\u2026</span>';
      }

      let selectedProject = "";
      let isNewProject = false;

      function selectProject(project) {
        selectedProject = project;
        isNewProject = false;
        showAgentPicker();
      }

      function selectNewProject() {
        const input = document.getElementById("new-project-name");
        const name = input.value.trim();
        if (!name) return;
        selectedProject = name;
        isNewProject = true;
        showAgentPicker();
      }

      async function showAgentPicker() {
        showView("agent");
        const el = document.getElementById("agent-list");
        el.innerHTML = '<div class="empty">Loading...</div>';
        try {
          const data = await api("/settings", undefined, projectMachine);
          const presets = Object.entries(data.presets || {});
          const customCmds = data.settings?.customCmds || [];
          let html = presets.map(([label, cmd]) => `
            <div class="card" onclick="createSessionWithAgent('${escAttr(cmd)}')">
              <div class="dot blue"></div>
              <div class="card-name">${esc(label)}</div>
            </div>
          `).join("");
          html += customCmds.map(cmd => `
            <div class="card" onclick="createSessionWithAgent('${escAttr(cmd)}')">
              <div class="dot green"></div>
              <div class="card-name">${esc(cmd)}</div>
              <button class="kill-btn" onclick="deleteCustomCmd('${escAttr(cmd)}', event)" title="Remove command">&times;</button>
            </div>
          `).join("");
          el.innerHTML = html;
        } catch {
          el.innerHTML = '<div class="empty">Failed to load agents</div>';
        }
      }

      async function addCustomCmd() {
        const input = document.getElementById("custom-cmd-input");
        const cmd = (input.value || "").trim();
        if (!cmd) return;
        try {
          await api("/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ addCustomCmd: cmd }),
          }, projectMachine);
          input.value = "";
          showAgentPicker();
        } catch (e) {
          alert("Failed to add command: " + (e.message || "error"));
        }
      }

      async function deleteCustomCmd(cmd, e) {
        e.stopPropagation();
        try {
          await api("/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ deleteCustomCmd: cmd }),
          }, projectMachine);
          showAgentPicker();
        } catch (e) {
          alert("Failed to delete command: " + (e.message || "error"));
        }
      }

      async function createSessionWithAgent(cmd) {
        const machine = projectMachine;
        showTerminalLoading(selectedProject);
        try {
          const body = isNewProject
            ? { newProject: selectedProject, cmd }
            : { project: selectedProject, cmd };
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          }, machine);
          if (data.session) {
            currentSession = data.session;
            currentMachine = machine;
            useDesktopTerminal = isDesktop();
            // Refresh session list so switcher has the new session
            await loadSessions();
            loadSessionSwitcher();
            if (useDesktopTerminal) {
              initDesktopTerminal();
            } else {
              resizePane();
              startPolling();
            }
          } else {
            const msg = data.error || "Server returned no session (is wolfpack up to date?)";
            alert("Failed to create session: " + msg);
            showView("sessions");
            loadSessions();
          }
        } catch (e) {
          alert("Failed to create session: " + (e.message || "network error"));
          showView("sessions");
          loadSessions();
        }
      }

      // ── Desktop Terminal (xterm.js + /ws/pty binary WS) ──

      let desktopReconnectTimer = null;
      let desktopReconnectDelay = 1000;

      function connectDesktopWs() {
        if (desktopReconnectTimer) { clearTimeout(desktopReconnectTimer); desktopReconnectTimer = null; }
        if (desktopWs && desktopWs.readyState <= WebSocket.OPEN) return;
        let wsUrl;
        if (currentMachine) {
          const remote = new URL(currentMachine);
          const proto = remote.protocol === "https:" ? "wss:" : "ws:";
          wsUrl = proto + "//" + remote.host + "/ws/pty?session=" + encodeURIComponent(currentSession);
        } else {
          const proto = location.protocol === "https:" ? "wss:" : "ws:";
          wsUrl = proto + "//" + location.host + "/ws/pty?session=" + encodeURIComponent(currentSession);
        }
        const ws = new WebSocket(wsUrl);
        ws.binaryType = "arraybuffer";
        desktopWs = ws;

        ws.onopen = () => {
          desktopReconnectDelay = 1000;
          const statusEl = document.getElementById("conn-status");
          if (statusEl) { statusEl.textContent = "reconnecting\u2026"; statusEl.style.display = "none"; }
          if (desktopFitAddon && desktopTerm) {
            try { desktopFitAddon.fit(); } catch {}
            ws.send(JSON.stringify({ type: "resize", cols: desktopTerm.cols, rows: desktopTerm.rows }));
          }
        };

        ws.onmessage = (ev) => {
          if (desktopTerm) desktopTerm.write(new Uint8Array(ev.data));
        };

        ws.onclose = (ev) => {
          const isCurrent = desktopWs === ws;
          if (isCurrent) desktopWs = null;
          if (isCurrent) {
            // 4001 = session unavailable/dead — show error, don't reconnect
            if (ev.code === 4001) {
              const statusEl = document.getElementById("conn-status");
              if (statusEl) {
                statusEl.textContent = "session unavailable — use ← to go back";
                statusEl.style.display = "block";
              }
              return;
            }
            // 1000 with "pty exited" = session ended normally
            if (ev.code === 1000 && ev.reason === "pty exited") {
              const statusEl = document.getElementById("conn-status");
              if (statusEl) {
                statusEl.textContent = "session ended — use ← to go back";
                statusEl.style.display = "block";
              }
              return;
            }
            const statusEl = document.getElementById("conn-status");
            if (statusEl && currentView === "terminal" && useDesktopTerminal) {
              statusEl.textContent = "reconnecting\u2026";
              statusEl.style.display = "block";
            }
            scheduleDesktopReconnect();
          }
        };

        ws.onerror = () => {};
      }

      function scheduleDesktopReconnect() {
        if (desktopReconnectTimer) return;
        if (!useDesktopTerminal) return;
        desktopReconnectTimer = setTimeout(() => {
          desktopReconnectTimer = null;
          if (useDesktopTerminal && (!desktopWs || desktopWs.readyState === WebSocket.CLOSED)) {
            connectDesktopWs();
          }
        }, desktopReconnectDelay);
        desktopReconnectDelay = Math.min(desktopReconnectDelay * 2, 5000);
      }

      function initDesktopTerminal() {
        if (desktopTerm) return;
        const container = document.getElementById("desktop-terminal-container");
        container.style.display = "block";
        container.innerHTML = "";
        document.getElementById("terminal").style.display = "none";
        document.getElementById("action-bar").style.display = "none";
        document.getElementById("input-bar").style.display = "none";
        document.getElementById("msg-preview").style.display = "none";

        const term = new Terminal({
          cursorBlink: true,
          fontSize: 13,
          fontFamily: '"SF Mono", "Menlo", "Consolas", "DejaVu Sans Mono", "Liberation Mono", monospace',
          theme: {
            background: "#0a0a0a",
            foreground: "#e0e0e0",
            cursor: "#e0e0e0",
            selectionBackground: "rgba(255,255,255,0.2)",
          },
          scrollback: 5000,
          allowProposedApi: true,
        });
        desktopTerm = term;

        const fitAddon = new FitAddon.FitAddon();
        desktopFitAddon = fitAddon;
        term.loadAddon(fitAddon);

        const searchAddon = new SearchAddon.SearchAddon();
        desktopSearchAddon = searchAddon;
        term.loadAddon(searchAddon);

        const unicodeAddon = new Unicode11Addon.Unicode11Addon();
        term.loadAddon(unicodeAddon);
        term.unicode.activeVersion = '11';

        term.open(container);
        try {
          const webgl = new WebglAddon.WebglAddon();
          webgl.onContextLoss(() => { webgl.dispose(); });
          term.loadAddon(webgl);
        } catch (e) { console.warn('WebGL addon failed, using canvas fallback', e); }
        fitAddon.fit();
        term.focus();

        term.onData((data) => {
          if (desktopWs && desktopWs.readyState === WebSocket.OPEN) {
            desktopWs.send(new TextEncoder().encode(data));
          }
        });

        term.onBinary((data) => {
          if (desktopWs && desktopWs.readyState === WebSocket.OPEN) {
            const buf = new Uint8Array(data.length);
            for (let i = 0; i < data.length; i++) buf[i] = data.charCodeAt(i) & 0xff;
            desktopWs.send(buf);
          }
        });

        const onResize = () => {
          if (desktopFitAddon) desktopFitAddon.fit();
        };
        window.addEventListener("resize", onResize);
        desktopResizeHandler = onResize;

        term.onResize(({ cols, rows }) => {
          if (desktopWs && desktopWs.readyState === WebSocket.OPEN) {
            desktopWs.send(JSON.stringify({ type: "resize", cols, rows }));
          }
        });

        const onKeyDown = (e) => {
          if (e.key.toLowerCase() === "f" && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
            e.preventDefault();
            if (!searchActive) toggleSearch();
            return;
          }
          if (searchActive && e.key === "Escape") {
            e.preventDefault();
            closeSearch();
          }
        };
        document.addEventListener("keydown", onKeyDown);
        container._onKeyDown = onKeyDown;

        connectDesktopWs();
      }

      function destroyDesktopTerminal() {
        if (desktopReconnectTimer) {
          clearTimeout(desktopReconnectTimer);
          desktopReconnectTimer = null;
        }
        desktopReconnectDelay = 1000;
        if (desktopWs) {
          desktopWs.close();
          desktopWs = null;
        }
        if (desktopResizeHandler) {
          window.removeEventListener("resize", desktopResizeHandler);
          desktopResizeHandler = null;
        }
        const container = document.getElementById("desktop-terminal-container");
        if (container._onKeyDown) {
          document.removeEventListener("keydown", container._onKeyDown);
          container._onKeyDown = null;
        }
        if (desktopSearchAddon) {
          desktopSearchAddon.dispose();
          desktopSearchAddon = null;
        }
        if (desktopTerm) {
          desktopTerm.dispose();
          desktopTerm = null;
        }
        desktopFitAddon = null;
        container.style.display = "none";
        container.innerHTML = "";
        document.getElementById("terminal").style.display = "";
        document.getElementById("action-bar").style.display = "";
        document.getElementById("input-bar").style.display = "";
      }

      // ── Terminal ──

      function startPolling() {
        poll();
        schedulePoll();
      }

      function schedulePoll() {
        if (pollTimer) clearTimeout(pollTimer);
        const interval = fastPoll ? 100 : 500;
        pollTimer = setTimeout(() => { poll().then(schedulePoll); }, interval);
      }

      function enterFastPoll() {
        fastPoll = true;
      }

      function stopPolling() {
        if (pollTimer) {
          clearTimeout(pollTimer);
          pollTimer = null;
        }
      }

      let pollFails = 0;

      async function poll() {
        if (!currentSession) return;
        try {
          const data = await api(
            "/poll?session=" + encodeURIComponent(currentSession),
            undefined, currentMachine,
          );
          if (data.error === "session not found") {
            stopPolling();
            const statusEl = document.getElementById("conn-status");
            if (statusEl) { statusEl.textContent = "session ended — use ← to go back"; statusEl.style.display = "block"; }
            return;
          }
          pollFails = 0;
          const term = document.getElementById("terminal");
          const statusEl = document.getElementById("conn-status");
          if (statusEl) { statusEl.textContent = "reconnecting\u2026"; statusEl.style.display = "none"; }
          if (data.pane != null) {
            const changed = data.pane !== lastRawPane;
            lastRawPane = data.pane;
            if (changed) {
              fastPoll = false;
              // Clear Enter retry if pane changed
              if (enterRetryTimer) {
                clearTimeout(enterRetryTimer);
                enterRetryTimer = null;
              }
              const wasAtBottom =
                term.scrollHeight - term.scrollTop - term.clientHeight < 40;
              if (searchActive && searchTerm) {
                applySearchHighlights();
              } else {
                term.textContent = data.pane;
              }
              if (wasAtBottom) term.scrollTop = term.scrollHeight;
            }
            if (data.pane.trim()) checkForAttention(data.pane);
          }
        } catch {
          pollFails++;
          if (pollFails >= 3) {
            const statusEl = document.getElementById("conn-status");
            if (statusEl) statusEl.style.display = "block";
          }
        }
      }

      let enterRetryTimer = null;

      async function sendMsg() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text || !currentSession) return;
        const saved = text;
        input.value = "";
        autoResizeInput();
        document.getElementById("msg-preview").style.display = "none";

        // Flash send button
        const btn = document.getElementById("send-btn");
        btn.classList.remove("send-flash");
        void btn.offsetWidth; // force reflow
        btn.classList.add("send-flash");

        try {
          await api("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, text: text.replace(/\n/g, " ") }),
          }, currentMachine);
          enterFastPoll();

          // Enter retry: if pane hasn't changed within 800ms, Enter may have been dropped.
          // Timer is cleared on any pane change (in poll()), so this only fires if truly stuck.
          // Scope to the session that was active at send time to prevent phantom Enter on other sessions.
          if (enterRetryTimer) clearTimeout(enterRetryTimer);
          const retrySession = currentSession;
          const retryMachine = currentMachine;
          enterRetryTimer = setTimeout(() => {
            if (currentSession === retrySession && currentMachine === retryMachine) {
              sendKey("Enter");
            }
            enterRetryTimer = null;
          }, 800);
        } catch {
          input.value = saved;
          autoResizeInput();
        }
      }

      function updatePreview() {
        const input = document.getElementById("msg-input");
        const preview = document.getElementById("msg-preview");
        if (input.scrollWidth > input.clientWidth) {
          preview.textContent = input.value;
          preview.style.display = "block";
        } else {
          preview.style.display = "none";
        }
      }

      async function sendKey(key) {
        if (!currentSession) return;
        await api("/key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: currentSession, key }),
        }, currentMachine);
        enterFastPoll();
      }

      async function killSession(name, e, machineUrl) {
        e.stopPropagation();
        if (!confirm(`Kill session "${name}"?`)) return;
        await api("/kill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: name }),
        }, machineUrl || "");
        loadSessions();
      }

      // ── Session drawer ──
      let drawerOpen = false;
      let drawerDragY = 0;
      let drawerDragStartY = 0;
      let drawerDragging = false;

      function loadSessionSwitcher() {
        const groups = lastSessionGroups;
        const list = document.getElementById("drawer-list");
        const multiMachine = getMachines().length > 0;
        let html = "";
        for (const g of groups) {
          for (const s of g.sessions) {
            const val = g.machine.url ? g.machine.url + "|" + s.name : s.name;
            const isCurrent = s.name === currentSession && g.machine.url === currentMachine;
            const machineLbl = multiMachine ? `<span class="drawer-item-machine">${esc(g.machine.name)}</span>` : "";
            html += `<div class="drawer-item${isCurrent ? " current" : ""}" data-val="${escAttr(val)}">
              <div class="dot ${isCurrent ? "active" : "inactive"}"></div>
              <span class="drawer-item-name">${esc(s.name)}</span>
              ${machineLbl}
            </div>`;
          }
        }
        list.innerHTML = html;
        // bind clicks
        list.querySelectorAll(".drawer-item").forEach(el => {
          el.onclick = () => { switchSession(el.dataset.val); closeDrawer(); };
        });
        // update chip label
        const chipLabel = document.getElementById("chip-label");
        if (chipLabel) chipLabel.textContent = currentSession || "";
      }

      function toggleDrawer() {
        if (drawerOpen) closeDrawer();
        else openDrawer();
      }

      function openDrawer() {
        if (drawerOpen) return;
        drawerOpen = true;
        const drawer = document.getElementById("session-drawer");
        const backdrop = document.getElementById("drawer-backdrop");
        const chip = document.getElementById("session-chip");
        // remove transition for instant position, then add for animation
        drawer.classList.remove("animating");
        drawer.style.transform = "translate3d(0, -100%, 0)";
        backdrop.classList.add("visible");
        backdrop.style.opacity = "0";
        drawer.offsetHeight; // force reflow
        drawer.classList.add("animating");
        drawer.classList.add("open");
        drawer.style.transform = "";
        backdrop.style.transition = "opacity 0.25s ease";
        backdrop.style.opacity = "1";
        chip.classList.add("open");
        haptic(5);
      }

      function closeDrawer(instant) {
        if (!drawerOpen) return;
        drawerOpen = false;
        const drawer = document.getElementById("session-drawer");
        const backdrop = document.getElementById("drawer-backdrop");
        const chip = document.getElementById("session-chip");
        chip.classList.remove("open");
        if (instant) {
          drawer.classList.remove("animating", "open");
          drawer.style.transform = "";
          backdrop.classList.remove("visible");
          backdrop.style.opacity = "";
          backdrop.style.transition = "";
          return;
        }
        drawer.classList.add("animating");
        drawer.classList.remove("open");
        drawer.style.transform = "translate3d(0, -100%, 0)";
        backdrop.style.transition = "opacity 0.25s ease";
        backdrop.style.opacity = "0";
        const cleanup = () => {
          backdrop.classList.remove("visible");
          backdrop.style.opacity = "";
          backdrop.style.transition = "";
          drawer.style.transform = "";
          drawer.classList.remove("animating");
        };
        drawer.addEventListener("transitionend", cleanup, { once: true });
        setTimeout(cleanup, 300);
      }

      // Drag gesture for drawer — header (open) + drawer itself (close)
      (function initDrawerDrag() {
        const hdr = document.querySelector("header");
        const drawer = document.getElementById("session-drawer");
        const backdrop = document.getElementById("drawer-backdrop");
        let startY = 0, startTime = 0, dragging = false, maxDrag = 0;

        function onStart(e) {
          if (currentView !== "terminal") return;
          startY = e.touches[0].clientY;
          startTime = Date.now();
          dragging = false;
          maxDrag = Math.min(drawer.scrollHeight, window.innerHeight * 0.5);
        }

        function onMove(e) {
          if (currentView !== "terminal") return;
          const dy = e.touches[0].clientY - startY;
          // opening: drag down when closed (header only)
          if (!drawerOpen && dy > 5) {
            if (!dragging) {
              dragging = true;
              drawer.classList.remove("animating", "open");
              drawer.style.pointerEvents = "none";
              backdrop.classList.add("visible");
            }
            const progress = Math.min(dy / maxDrag, 1);
            drawer.style.transform = `translate3d(0, ${-100 + progress * 100}%, 0)`;
            backdrop.style.opacity = String(progress);
            backdrop.style.transition = "none";
          }
          // closing: drag up when open (header or drawer)
          if (drawerOpen && dy < -5) {
            if (!dragging) {
              dragging = true;
              drawer.classList.remove("animating");
            }
            const progress = Math.min(Math.abs(dy) / maxDrag, 1);
            drawer.style.transform = `translate3d(0, ${-progress * 100}%, 0)`;
            backdrop.style.opacity = String(1 - progress);
            backdrop.style.transition = "none";
          }
        }

        function onEnd(e) {
          if (!dragging) return;
          dragging = false;
          const dy = e.changedTouches[0].clientY - startY;
          const elapsed = Date.now() - startTime;
          const velocity = Math.abs(dy) / Math.max(elapsed, 1) * 1000;
          const threshold = maxDrag * 0.25;

          if (!drawerOpen) {
            // was dragging to open
            if (dy > threshold || (velocity > 300 && dy > 10)) {
              const baseDur = 0.22;
              const speedFactor = Math.min(velocity / 1500, 1);
              const dur = Math.max(0.1, baseDur * (1 - speedFactor * 0.6));
              drawer.style.transition = `transform ${dur.toFixed(2)}s cubic-bezier(0.2, 0.9, 0.3, 1)`;
              drawer.style.transform = "translate3d(0, 0, 0)";
              backdrop.style.transition = `opacity ${dur.toFixed(2)}s ease`;
              backdrop.style.opacity = "1";
              drawerOpen = true;
              document.getElementById("session-chip").classList.add("open");
              haptic(5);
              drawer.addEventListener("transitionend", () => {
                drawer.style.transition = "";
                drawer.style.pointerEvents = "";
                drawer.classList.add("open");
              }, { once: true });
            } else {
              drawer.style.transition = "transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1)";
              drawer.style.transform = "translate3d(0, -100%, 0)";
              backdrop.style.transition = "opacity 0.2s ease";
              backdrop.style.opacity = "0";
              drawer.addEventListener("transitionend", () => {
                drawer.style.transition = ""; drawer.style.transform = ""; drawer.style.pointerEvents = "";
                backdrop.classList.remove("visible"); backdrop.style.opacity = ""; backdrop.style.transition = "";
              }, { once: true });
            }
          } else {
            // was dragging to close
            if (Math.abs(dy) > threshold || (velocity > 300 && dy < -10)) {
              closeDrawer();
            } else {
              drawer.style.transition = "transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1)";
              drawer.style.transform = "translate3d(0, 0, 0)";
              backdrop.style.transition = "opacity 0.2s ease";
              backdrop.style.opacity = "1";
              drawer.addEventListener("transitionend", () => {
                drawer.style.transition = ""; drawer.classList.add("open");
              }, { once: true });
            }
          }
        }

        // Header: drag down to open, drag up to close
        hdr.addEventListener("touchstart", onStart, { passive: true });
        hdr.addEventListener("touchmove", onMove, { passive: true });
        hdr.addEventListener("touchend", onEnd, { passive: true });
        // Drawer: drag up to close
        drawer.addEventListener("touchstart", onStart, { passive: true });
        drawer.addEventListener("touchmove", onMove, { passive: true });
        drawer.addEventListener("touchend", onEnd, { passive: true });
      })();

      function switchSession(val) {
        let name, machineUrl;
        // Values with | are remote: "url|sessionName"
        const pipeIdx = val.indexOf("|");
        if (pipeIdx !== -1) {
          machineUrl = val.substring(0, pipeIdx);
          name = val.substring(pipeIdx + 1);
        } else {
          machineUrl = "";
          name = val;
        }
        if (name === currentSession && machineUrl === currentMachine) return;
        closeDrawer(true);
        // Suspend current mode (cache terminal state)
        if (useDesktopTerminal) {
          destroyDesktopTerminal();
        } else {
          stopPolling();
        }
        currentSession = name;
        currentMachine = machineUrl;
        lastRawPane = null;
        loadSessionSwitcher();
        useDesktopTerminal = isDesktop();
        if (useDesktopTerminal) {
          initDesktopTerminal();
        } else {
          document.getElementById("terminal").textContent = "";
          resizePane();
          startPolling();
        }
      }

      // ── Notifications ──

      let notificationsEnabled = false;


      function requestNotifications() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().then((p) => {
            notificationsEnabled = p === "granted";
          });
        } else if (
          "Notification" in window &&
          Notification.permission === "granted"
        ) {
          notificationsEnabled = true;
        }
      }

      const ATTENTION_PATTERNS = [
        /\? \(y\/n\)/i,
        /\[Y\/n\]/i,
        /\[yes\/no\]/i,
        /Do you want to/i,
        /Press Enter/i,
        /permission/i,
        /approve/i,
        /waiting for/i,
        /Error:/i,
        /error\[/i,
        /failed/i,
        /❌/,
      ];

      // Per-session notification tracking: { "machineUrl|sessionName": "lastNotifiedText" }
      const notifiedSessions = {};

      function checkForAttention(paneText) {
        if (!notificationsEnabled || !currentSession) return;
        if (document.visibilityState === "visible") return;
        checkSessionAttention(currentSession, currentMachine, paneText);
      }

      function checkSessionAttention(sessionName, machineUrl, paneText) {
        if (!notificationsEnabled) return;
        if (document.visibilityState === "visible") return;

        const lastLines = paneText.trimEnd().split("\n").slice(-5).join("\n");
        const key = (machineUrl || "") + "|" + sessionName;
        if (notifiedSessions[key] === lastLines) return;

        for (const pat of ATTENTION_PATTERNS) {
          if (pat.test(lastLines)) {
            notifiedSessions[key] = lastLines;
            const machineName = machineUrl
              ? (getMachines().find(m => m.url === machineUrl)?.name || "remote")
              : (selfName || "local");
            const title = getMachines().length > 0
              ? `${machineName}: ${sessionName}`
              : `Wolfpack: ${sessionName}`;
            new Notification(title, {
              body: lastLines.slice(-120),
              tag: "wolfpack-" + key,
            });
            navigator.vibrate?.([200, 100, 200]);
            return;
          }
        }
        // No pattern matched — clear so we can re-notify if it matches again later
        delete notifiedSessions[key];
      }

      // Background attention check for ALL sessions (runs regardless of current view)
      let bgAttentionTimer = null;

      async function checkAllSessionsAttention() {
        if (!notificationsEnabled) return;
        if (document.visibilityState === "visible") return;
        try {
          const machines = getMachines();
          const fetches = [
            api("/sessions").then(d => ({ sessions: d.sessions || [], machineUrl: "" })).catch(() => null),
            ...machines.map(m =>
              api("/sessions", undefined, m.url).then(d => ({ sessions: d.sessions || [], machineUrl: m.url })).catch(() => null)
            ),
          ];
          const results = await Promise.all(fetches);
          for (const r of results) {
            if (!r) continue;
            for (const s of r.sessions) {
              // Skip current session — poll() already handles it
              if (s.name === currentSession && r.machineUrl === currentMachine) continue;
              if (s.lastLine) checkSessionAttention(s.name, r.machineUrl, s.lastLine);
            }
          }
        } catch {}
      }

      function startBgAttention() {
        if (bgAttentionTimer) return;
        bgAttentionTimer = setInterval(checkAllSessionsAttention, 10000);
      }

      function stopBgAttention() {
        if (bgAttentionTimer) { clearInterval(bgAttentionTimer); bgAttentionTimer = null; }
      }

      requestNotifications();
      startBgAttention();

      // Pause bg attention when visible, resume when hidden; re-poll terminal on foreground
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          stopBgAttention();
          // Restart session refresh if on sessions view
          if (currentView === "sessions" && !sessionRefreshTimer) {
            loadSessions();
            sessionRefreshTimer = setInterval(loadSessions, 5000);
          }
          if (currentSession && currentView === "terminal") {
            if (useDesktopTerminal) {
              // Desktop: reconnect if WS is dead (connectDesktopWs guards against duplicates)
              if (desktopTerm) {
                desktopReconnectDelay = 1000;
                connectDesktopWs();
              }
            } else {
              // Mobile: resume polling
              poll();
              enterFastPoll();
              schedulePoll();
            }
          }
        } else {
          // Stop session refresh when backgrounded — bgAttention covers notifications
          if (sessionRefreshTimer) {
            clearInterval(sessionRefreshTimer);
            sessionRefreshTimer = null;
          }
          startBgAttention();
        }
      });

      // Dismiss preview when tapping terminal area
      document.getElementById("terminal").addEventListener("click", () => {
        document.getElementById("msg-preview").style.display = "none";
      });

      // Auto-resize textarea as content grows
      function autoResizeInput() {
        const ta = document.getElementById("msg-input");
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      }

      const msgInput = document.getElementById("msg-input");
      msgInput.addEventListener("input", () => {
        autoResizeInput();
        updatePreview();
      });
      // Mobile: Enter adds newline, Shift+Enter submits
      // Desktop: Enter submits, Shift+Enter adds newline
      const isMobile = !isDesktop();

      msgInput.addEventListener("keydown", (e) => {
        if (currentView !== "terminal") return;
        const empty = !msgInput.value.trim();
        if (e.key === "Enter") {
          if (isMobile) {
            // Mobile: Enter adds newline, Shift+Enter submits
            if (e.shiftKey) {
              e.preventDefault();
              if (empty) sendKey("Enter"); else sendMsg();
            }
            // else: let Enter add newline naturally
          } else {
            // Desktop: Enter submits, Shift+Enter adds newline
            if (!e.shiftKey) {
              e.preventDefault();
              if (empty) sendKey("Enter"); else sendMsg();
            }
          }
        } else if (e.key === "ArrowUp" && empty) {
          e.preventDefault();
          sendKey("Up");
        } else if (e.key === "ArrowDown" && empty) {
          e.preventDefault();
          sendKey("Down");
        }
      });

      // Global arrow keys → tmux when in terminal and textarea not focused
      document.addEventListener("keydown", (e) => {
        if (currentView !== "terminal") return;
        if (useDesktopTerminal) return; // desktop terminal has its own handler
        const tag = document.activeElement && document.activeElement.tagName;
        if (document.activeElement === msgInput || tag === "SELECT" || tag === "INPUT") return;
        const keyMap = { ArrowUp: "Up", ArrowDown: "Down", ArrowLeft: "Left", ArrowRight: "Right", Enter: "Enter", Escape: "Escape" };
        const mapped = keyMap[e.key];
        if (mapped) { e.preventDefault(); sendKey(mapped); }
      });

      document
        .getElementById("new-project-name")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") selectNewProject();
        });

      // ── Settings ──

      async function showSettings() {
        showView("settings");
        renderMachinesList();
      }

      async function renderMachinesList() {
        const machines = getMachines();
        const el = document.getElementById("machines-list");
        if (!machines.length) {
          el.innerHTML = '<div style="color:#444;font-size:12px;padding:6px 0">No remote machines added</div>';
          return;
        }
        // Check status of each machine
        const checks = await Promise.all(machines.map(m =>
          fetch(m.url + "/api/info", { signal: AbortSignal.timeout(3000) })
            .then(() => true).catch(() => false)
        ));
        el.innerHTML = machines.map((m, i) => {
          const dot = checks[i] ? "green" : "red";
          return `<div class="machine-item">
            <div class="dot ${dot}"></div>
            <span class="machine-item-name">${esc(m.name)}<span class="machine-item-url">${esc(m.url)}</span></span>
            <button class="machine-remove-btn" onclick="removeMachineUI('${escAttr(m.url)}')">&times;</button>
          </div>`;
        }).join("");
      }

      function removeMachineUI(url) {
        removeMachine(url);
        renderMachinesList();
      }

      async function discoverMachines() {
        const statusEl = document.getElementById("discover-status");
        statusEl.textContent = "Scanning tailnet...";
        statusEl.style.color = "#555";
        try {
          const data = await api("/discover");
          if (data.error) {
            statusEl.textContent = data.error;
            statusEl.style.color = "#cc3333";
            return;
          }
          const peers = data.peers || [];
          if (!peers.length) {
            statusEl.textContent = "No wolfpack instances found on tailnet";
            statusEl.style.color = "#555";
            return;
          }
          const machines = getMachines();
          let added = 0;
          for (const p of peers) {
            if (!machines.some(m => m.url === p.url)) {
              machines.push({ url: p.url, name: p.name || p.hostname });
              added++;
            }
          }
          if (added > 0) {
            saveMachines(machines);
            renderMachinesList();
          }
          statusEl.textContent = added > 0
            ? `Found ${peers.length}, added ${added} new`
            : `Found ${peers.length}, all already added`;
          statusEl.style.color = "#00ff41";
        } catch {
          statusEl.textContent = "Discovery failed";
          statusEl.style.color = "#cc3333";
        }
      }

      // ── Search ──

      let searchActive = false;
      let searchTerm = "";
      let searchMatches = [];
      let searchIndex = -1;
      let lastRawPane = null;

      function toggleSearch() {
        const bar = document.getElementById("search-bar");
        if (searchActive) {
          closeSearch();
        } else {
          searchActive = true;
          bar.classList.add("visible");
          document.getElementById("search-input").focus();
        }
      }

      function closeSearch() {
        searchActive = false;
        searchTerm = "";
        searchMatches = [];
        searchIndex = -1;
        document.getElementById("search-bar").classList.remove("visible");
        document.getElementById("search-input").value = "";
        document.getElementById("search-count").textContent = "";
        if (useDesktopTerminal) {
          if (desktopSearchAddon) desktopSearchAddon.clearDecorations();
          if (desktopTerm) desktopTerm.focus();
        } else {
          const term = document.getElementById("terminal");
          if (lastRawPane) term.textContent = lastRawPane;
        }
      }

      function doSearch() {
        searchTerm = document.getElementById("search-input").value;
        if (!searchTerm) {
          document.getElementById("search-count").textContent = "";
          if (useDesktopTerminal) {
            if (desktopSearchAddon) desktopSearchAddon.clearDecorations();
          } else {
            const term = document.getElementById("terminal");
            if (lastRawPane) term.textContent = lastRawPane;
          }
          searchMatches = [];
          searchIndex = -1;
          return;
        }
        if (useDesktopTerminal && desktopSearchAddon) {
          desktopSearchAddon.findNext(searchTerm, { caseSensitive: false, decorations: {
            matchOverviewRuler: "#6e5c00",
            activeMatchColorOverviewRuler: "#ff6600",
          }});
          return;
        }
        searchIndex = 0;
        applySearchHighlights();
      }

      function applySearchHighlights() {
        if (useDesktopTerminal) return; // handled by xterm-addon-search
        const term = document.getElementById("terminal");
        if (!searchTerm || !lastRawPane) return;
        const escaped = lastRawPane.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const re = new RegExp(escapedTerm.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"), "gi");
        let count = 0;
        let current = searchIndex;
        const html = escaped.replace(re, (m) => {
          const cls = count === current ? "search-current" : "";
          count++;
          return `<mark class="${cls}">${m}</mark>`;
        });
        searchMatches = Array.from({ length: count });
        if (count > 0 && searchIndex >= count) searchIndex = 0;
        document.getElementById("search-count").textContent = count > 0 ? `${searchIndex + 1}/${count}` : "0/0";
        term.innerHTML = html;
        const cur = term.querySelector("mark.search-current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      // Desktop search is handled by xterm-addon-search (see doSearch/nextMatch/prevMatch)

      function nextMatch() {
        if (useDesktopTerminal && desktopSearchAddon && searchTerm) {
          desktopSearchAddon.findNext(searchTerm, { caseSensitive: false });
          return;
        }
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex + 1) % searchMatches.length;
        applySearchHighlights();
      }

      function prevMatch() {
        if (useDesktopTerminal && desktopSearchAddon && searchTerm) {
          desktopSearchAddon.findPrevious(searchTerm, { caseSensitive: false });
          return;
        }
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
        applySearchHighlights();
      }

      async function closeSession() {
        const session = currentSession;
        const machine = currentMachine;
        if (useDesktopTerminal) {
          destroyDesktopTerminal();
        } else {
          stopPolling();
        }
        useDesktopTerminal = false;
        closeSearch();
        currentSession = null;
        currentMachine = "";
        showView("sessions");
        if (session) {
          await api("/kill", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session }),
          }, machine);
        }
        loadSessions();
      }

      function confirmKillSession() {
        if (confirm(`Kill session "${currentSession}"?`)) {
          closeSession();
        }
      }

      document.getElementById("search-input").addEventListener("input", doSearch);
      document.getElementById("search-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSearch();
        else if (e.key === "Enter") {
          e.preventDefault();
          if (e.shiftKey) prevMatch(); else nextMatch();
        }
      });

      function esc(s) {
        if (s == null) return "";
        const d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
      }

      // JS-safe escaper for use inside onclick="func('...')" attribute contexts.
      // Backslash-escapes characters that could break out of a JS string literal
      // AFTER HTML attribute decoding.
      function escAttr(s) {
        if (s == null) return "";
        return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '\\"')
          .replace(/</g, "\\x3c").replace(/>/g, "\\x3e").replace(/&/g, "\\x26");
      }

      // ── Swipe Gesture Engine (mobile only) ──
      if (!isDesktop()) {
        const vc = document.getElementById("view-container");
        let sx = 0, sy = 0, st = 0, dx = 0;
        let locked = false, scrolling = false, rafId = 0;
        let isBack = false;
        let fgEl = null, bgEl = null;
        let swipeCard = null;
        const W = () => window.innerWidth;

        const BACK_TARGET = {
          terminal: "sessions", ralph: "sessions", "ralph-detail": "ralph",
          projects: "sessions", agent: "projects", settings: "sessions",
          "ralph-start": "ralph",
        };

        function applySwipe() {
          if (!fgEl) return;
          const progress = Math.min(Math.abs(dx) / W(), 1);
          if (isBack) {
            fgEl.style.transform = `translate3d(${Math.max(0, dx)}px, 0, 0)`;
            bgEl.style.transform = `translate3d(${-30 + progress * 30}%, 0, 0)`;
          } else {
            // card follows finger, terminal peeks in from right
            if (swipeCard) swipeCard.style.transform = `translate3d(${Math.min(0, dx)}px, 0, 0)`;
            bgEl.style.transform = `translate3d(${100 - progress * 100}%, 0, 0)`;
          }
        }

        vc.addEventListener("touchstart", (e) => {
          if (e.touches.length !== 1) return;
          sx = e.touches[0].clientX; sy = e.touches[0].clientY;
          st = Date.now(); dx = 0;
          locked = false; scrolling = false;
          fgEl = null; bgEl = null; swipeCard = null;
        }, { passive: true });

        vc.addEventListener("touchmove", (e) => {
          if (e.touches.length !== 1 || scrolling) return;
          const cx = e.touches[0].clientX, cy = e.touches[0].clientY;
          dx = cx - sx;
          const dy = cy - sy;

          if (!locked) {
            if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
            if (Math.abs(dy) > Math.abs(dx) * 0.7) { scrolling = true; return; }
            locked = true;

            const backTarget = BACK_TARGET[currentView];
            // terminal view: only allow back swipe from left edge (40px) to avoid stealing terminal interaction
            const edgeOnly = currentView === "terminal";
            if (dx > 0 && backTarget && (!edgeOnly || sx < 40)) {
              isBack = true;
              fgEl = document.getElementById(currentView + "-view");
              bgEl = document.getElementById(backTarget + "-view");
            } else if (dx < 0) {
              const card = e.target.closest(".card, .ralph-card");
              if (!card) { scrolling = true; return; }
              swipeCard = card;
              isBack = false;
              fgEl = document.getElementById(currentView + "-view");
              const targetView = currentView === "sessions" ? "terminal" : currentView === "ralph" ? "ralph-detail" : null;
              if (!targetView) { scrolling = true; return; }
              bgEl = document.getElementById(targetView + "-view");
            } else { scrolling = true; return; }

            if (isBack) {
              fgEl.style.transition = "none";
              fgEl.style.zIndex = "2";
              fgEl.classList.add("swiping");
              bgEl.style.transition = "none";
              bgEl.style.transform = "translate3d(-30%, 0, 0)";
              bgEl.classList.add("visible");
              bgEl.style.zIndex = "0";
            } else {
              // forward: card drags independently, terminal peeks behind
              // eager pre-load: fetch the swiped session's content into terminal
              if (swipeCard && targetView === "terminal") {
                const onclick = swipeCard.getAttribute("onclick") || "";
                const m = onclick.match(/openSession\('([^']+)'(?:,\s*'([^']*)')?\)/);
                if (m) {
                  const sName = m[1], sMachine = m[2] || "";
                  const base = sMachine ? sMachine + "/api" : "/api";
                  fetch(base + "/poll?session=" + encodeURIComponent(sName))
                    .then(r => r.ok ? r.json() : null)
                    .then(d => { if (d && d.pane != null) document.getElementById("terminal").textContent = d.pane; })
                    .catch(() => {});
                }
              }
              if (swipeCard) swipeCard.style.transition = "none";
              bgEl.style.transition = "none";
              bgEl.style.transform = "translate3d(100%, 0, 0)";
              bgEl.classList.add("visible");
              bgEl.style.zIndex = "2";
              fgEl.style.zIndex = "1";
            }
          }

          if (locked) e.preventDefault();

          cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(applySwipe);
        }, { passive: false });

        vc.addEventListener("touchend", () => {
          cancelAnimationFrame(rafId);
          if (!fgEl || !locked) return;

          const elapsed = Date.now() - st;
          const velocity = Math.abs(dx) / Math.max(elapsed, 1) * 1000;
          const committed = Math.abs(dx) > 60 || (velocity > 250 && Math.abs(dx) > 15);
          const shouldComplete = isBack ? (committed && dx > 0) : (committed && dx < 0);

          // velocity-adaptive duration: fast flick = short animation, slow drag = longer
          const baseDur = shouldComplete ? 0.22 : 0.3;
          const speedFactor = Math.min(velocity / 1500, 1);
          const dur = Math.max(0.12, baseDur * (1 - speedFactor * 0.6)).toFixed(2) + "s";
          const ease = "cubic-bezier(0.2, 0.9, 0.3, 1)";
          const trans = `transform ${dur} ${ease}`;

          if (isBack) {
            fgEl.style.transition = trans;
            bgEl.style.transition = trans;
            if (shouldComplete) {
              fgEl.style.transform = "translate3d(100%, 0, 0)";
              bgEl.style.transform = "translate3d(0, 0, 0)";
            } else {
              fgEl.style.transform = "translate3d(0, 0, 0)";
              bgEl.style.transform = "translate3d(-30%, 0, 0)";
            }
          } else {
            // forward: animate the card + terminal independently
            if (swipeCard) swipeCard.style.transition = trans;
            bgEl.style.transition = trans;
            if (shouldComplete) {
              if (swipeCard) swipeCard.style.transform = `translate3d(-${W()}px, 0, 0)`;
              bgEl.style.transform = "translate3d(0, 0, 0)";
            } else {
              if (swipeCard) swipeCard.style.transform = "translate3d(0, 0, 0)";
              bgEl.style.transform = "translate3d(100%, 0, 0)";
            }
          }

          const fg = fgEl, bg = bgEl, card = swipeCard, back = isBack;
          const durMs = parseFloat(dur) * 1000 + 50;
          let finalized = false;
          const finalize = () => {
            if (finalized) return;
            finalized = true;
            if (card) { card.style.transition = ""; card.style.transform = ""; }

            if (!shouldComplete) {
              // cancelled — departing view (bg) snaps away, reset both
              bg.classList.remove("visible");
              [fg, bg].forEach(el => {
                el.style.transition = ""; el.style.zIndex = ""; el.style.transform = ""; el.classList.remove("swiping");
              });
              return;
            }

            // remove .visible from departing view BEFORE clearing transforms to prevent flash
            fg.classList.remove("visible");
            [fg, bg].forEach(el => {
              el.style.transition = ""; el.style.zIndex = ""; el.style.transform = ""; el.classList.remove("swiping");
            });

            haptic(10);
            swipeNavigated = true;

            if (back) {
              const backView = BACK_TARGET[currentView];
              if (backView === "sessions") {
                const backBtn = document.getElementById("back-btn");
                if (backBtn && backBtn.onclick) backBtn.onclick();
              } else {
                showView(backView, true);
              }
            } else if (card) {
              card.click();
            }
          };
          fg.addEventListener("transitionend", finalize, { once: true });
          setTimeout(finalize, durMs);

          fgEl = null; bgEl = null; swipeCard = null;
        }, { passive: true });
      }

      initSettings();
      showView("sessions", true);
      loadSessions();

      // Unregister any stale service workers (no longer used)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
    </script>
  </body>
</html>
