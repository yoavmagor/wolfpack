<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" id="manifest-link" href="/manifest.json" />
    <script>
      // Pass ?name= param to manifest for custom PWA app naming
      const p = new URLSearchParams(window.location.search);
      const n = p.get("name");
      if (n) document.getElementById("manifest-link").href = "/manifest.json?name=" + encodeURIComponent(n);
    </script>
    <title>Wolfpack</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Mono", "SF Mono", "Consolas", monospace;
        background: #0a0a0a;
        color: #b0b0b0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 14px;
      }
      header {
        padding: 8px 12px;
        background: #111;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 48px;
        flex-shrink: 0;
        border-bottom: 1px solid #222;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: start;
      }
      .header-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-self: center;
      }
      header h1 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #00ff41;
        white-space: nowrap;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: end;
      }
      .back-btn {
        display: none;
        background: none;
        border: 1px solid #00ff41;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 2px;
        transition: all 0.15s ease;
        min-height: 38px;
        -webkit-tap-highlight-color: transparent;
      }
      .back-btn:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .view {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .view.visible {
        display: flex;
      }

      .list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .card {
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .card:active {
        background: #1a1a1a;
        border-color: #00ff41;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.green {
        background: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .dot.blue {
        background: #00ff41;
      }
      .dot.gray {
        background: #333;
      }
      .card-machine {
        font-size: 10px;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .card-name {
        font-size: 13px;
        font-weight: 600;
        color: #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .card-preview {
        font-size: 12px;
        color: #555;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-sub {
        font-size: 12px;
        color: #333;
        margin-left: auto;
      }

      .new-btn {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        color: #00ff41;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .new-btn:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      #terminal {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre;
        color: #b0b0b0;
        background: #0a0a0a;
        -webkit-overflow-scrolling: touch;
      }

      #action-bar {
        display: none;
        gap: 6px;
        padding: 8px 10px;
        background: #111;
        border-top: 1px solid #222;
        flex-wrap: wrap;
      }
      #action-bar.visible {
        display: flex;
      }
      .action-btn {
        background: none;
        border: 1px solid #333;
        border-radius: 2px;
        padding: 10px 16px;
        min-height: 44px;
        min-width: 44px;
        color: #b0b0b0;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .action-btn:active {
        background: #b0b0b0;
        color: #0a0a0a;
      }
      .action-btn.primary {
        border-color: #00ff41;
        color: #00ff41;
      }
      .action-btn.primary:active {
        background: #00ff41;
        color: #0a0a0a;
      }
      .action-btn.danger {
        border-color: #cc3333;
        color: #cc3333;
      }
      .action-btn.danger:active {
        background: #cc3333;
        color: #0a0a0a;
      }

      #input-bar {
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        background: #111;
        border-top: 1px solid #222;
        flex-shrink: 0;
      }
      #input-bar textarea {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 16px;
        font-family: inherit;
        outline: none;
        resize: none;
        overflow-y: auto;
        line-height: 1.4;
        max-height: 120px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      #input-bar textarea:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      #msg-preview {
        display: none;
        position: fixed;
        bottom: 60px;
        left: 10px;
        right: 10px;
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 12px;
        color: #b0b0b0;
        font-size: 14px;
        font-family: inherit;
        white-space: pre-wrap;
        max-height: 50vh;
        overflow-y: auto;
        z-index: 10;
      }
      #input-bar button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        width: 44px;
        height: 44px;
        color: #00ff41;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        align-self: flex-end;
        transition: all 0.15s ease;
      }
      #input-bar button:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .new-project-row {
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #111;
        border-bottom: 1px solid #222;
      }
      .new-project-row input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .new-project-row input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .new-project-row button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 8px 16px;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .new-project-row button:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .empty {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #333;
      }

      .settings-section {
        padding: 12px;
      }
      .settings-label {
        font-size: 11px;
        color: #555;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .preset-btn {
        display: block;
        width: 100%;
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 12px 16px;
        margin-bottom: 6px;
        color: #b0b0b0;
        font-size: 13px;
        font-family: inherit;
        text-align: left;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .preset-btn:active {
        background: #1a1a1a;
      }
      .preset-btn.selected {
        border-color: #00ff41;
        color: #00ff41;
      }
      .custom-cmd-row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .custom-cmd-row input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 10px 12px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .custom-cmd-row input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .custom-cmd-row button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 8px 16px;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .custom-cmd-row button:active {
        background: #00ff41;
        color: #0a0a0a;
      }
      .session-select {
        background: transparent;
        border: none;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3px;
        padding: 0;
        outline: none;
        max-width: 200px;
        -webkit-appearance: none;
        appearance: none;
      }
      .kill-btn {
        background: none;
        border: none;
        color: #cc3333;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        margin-left: auto;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.15s ease;
      }
      .kill-btn:active {
        color: #ff4444;
      }
      .loading-text {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #555;
        font-size: 13px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes send-flash {
        0% { background: #00ff41; color: #0a0a0a; }
        100% { background: none; color: #00ff41; }
      }
      .send-flash {
        animation: send-flash 0.3s ease-out;
      }
      .settings-gear {
        background: none;
        border: 1px solid #555;
        border-radius: 2px;
        color: #b0b0b0;
        font-size: 18px;
        cursor: pointer;
        padding: 6px;
        min-width: 36px;
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .settings-gear:active {
        color: #00ff41;
      }
      .search-btn {
        background: none;
        border: none;
        color: #555;
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        transition: color 0.15s ease;
      }
      .search-btn:active {
        color: #00ff41;
      }
      #search-bar {
        display: none;
        position: absolute;
        top: 48px;
        left: 0;
        right: 0;
        z-index: 20;
        background: #111;
        border-bottom: 1px solid #222;
        padding: 8px 10px;
        gap: 8px;
        align-items: center;
      }
      #search-bar.visible {
        display: flex;
      }
      #search-bar input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 6px 10px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      #search-bar input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      #search-bar button {
        background: none;
        border: 1px solid #333;
        border-radius: 2px;
        color: #b0b0b0;
        font-size: 13px;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      #search-bar button:active {
        background: #b0b0b0;
        color: #0a0a0a;
      }
      #search-count {
        color: #555;
        font-size: 11px;
        white-space: nowrap;
      }
      #terminal mark {
        background: #6e5c00;
        color: #e0e0e0;
        border-radius: 2px;
      }
      #terminal mark.search-current {
        background: #ff6600;
        color: #fff;
      }
      .dot.yellow {
        background: #ff6600;
        animation: dot-pulse 1.5s ease-in-out infinite;
      }
      .dot.red { background: #cc3333; }
      @keyframes dot-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .machine-group { margin-bottom: 12px; }
      .machine-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 4px 4px;
        font-size: 11px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .machine-header .dot { width: 7px; height: 7px; }
      .machine-add-btn {
        margin-left: auto;
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        color: #00ff41;
        font-size: 16px;
        font-weight: 700;
        width: 30px;
        height: 30px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .machine-add-btn:active { border-color: #00ff41; color: #00ff41; }
      .machine-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        margin-bottom: 6px;
      }
      .machine-item .dot { width: 8px; height: 8px; }
      .machine-item-name { flex: 1; font-size: 13px; color: #b0b0b0; }
      .machine-item-url { font-size: 11px; color: #444; margin-left: 4px; }
      .machine-remove-btn {
        background: none;
        border: none;
        color: #cc3333;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
        -webkit-tap-highlight-color: transparent;
      }
      .machine-remove-btn:active { color: #ff4444; }
      .machine-add-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .machine-add-row input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 10px 12px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .machine-add-row input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .machine-add-row button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 8px 16px;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
      }
      .machine-add-row button:active {
        background: #00ff41;
        color: #0a0a0a;
      }
      #qr-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #qr-overlay.visible { display: flex; }
      #qr-overlay video {
        width: 80vw;
        max-width: 400px;
        border-radius: 4px;
      }
      #qr-overlay .qr-close {
        margin-top: 16px;
        background: none;
        border: 1px solid #fff;
        border-radius: 2px;
        color: #fff;
        padding: 10px 24px;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
      }
      .machine-add-error {
        color: #cc3333;
        font-size: 11px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <button class="back-btn" id="back-btn">&lt; BACK</button>
      </div>
      <div class="header-center" id="header-center">
        <div id="header-machine-label" style="display:none;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;text-align:center;line-height:1;margin-bottom:2px"></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="wolf-icon" style="font-size:20px;line-height:1">🐺</span>
          <h1 id="header-title">wolfpack</h1>
          <select
            id="session-switcher"
            class="session-select"
            style="display: none"
            onchange="switchSession(this.value)"
          ></select>
        </div>
      </div>
      <div class="header-right">
        <button class="search-btn" id="search-btn" onclick="toggleSearch()">&#128269;</button>
        <button class="settings-gear" id="gear-btn" onclick="showSettings()">&#9881;</button>
      </div>
    </header>

    <!-- Sessions view -->
    <div id="sessions-view" class="view visible">
      <div id="session-list" class="list"></div>
    </div>

    <!-- Project picker view -->
    <div id="projects-view" class="view">
      <div class="new-project-row">
        <input
          id="new-project-name"
          type="text"
          placeholder="new project name..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        />
        <button onclick="createNewProject()">Create</button>
      </div>
      <div id="project-list" class="list"></div>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="view">
      <div class="list">
        <div class="settings-section">
          <div class="settings-label">Machines</div>
          <div id="machines-list"></div>
          <div class="machine-add-row">
            <input id="machine-url-input" type="url" placeholder="http://192.168.1.x:18790" autocomplete="off" autocorrect="off" autocapitalize="off" />
            <button onclick="addMachineFromInput()">Add</button>
            <button id="qr-scan-btn" onclick="startQrScan()" style="display:none">Scan</button>
          </div>
          <div id="machine-add-error" class="machine-add-error"></div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Agent Command</div>
          <div id="preset-list"></div>
          <div class="settings-label" style="margin-top: 16px">
            Custom Command
          </div>
          <div class="custom-cmd-row">
            <input
              id="custom-cmd"
              type="text"
              placeholder="e.g. aider --model gpt-4o"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
            />
            <button onclick="saveCustomCmd()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- QR scanner overlay -->
    <div id="qr-overlay">
      <video id="qr-video" autoplay playsinline></video>
      <button class="qr-close" onclick="stopQrScan()">Close</button>
    </div>

    <!-- Terminal view -->
    <div id="terminal-view" class="view">
      <div id="search-bar">
        <input id="search-input" type="text" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <span id="search-count"></span>
        <button onclick="prevMatch()">&#9650;</button>
        <button onclick="nextMatch()">&#9660;</button>
        <button onclick="closeSearch()">&#10005;</button>
      </div>
      <div
        id="conn-status"
        style="
          display: none;
          background: #cc3333;
          color: #fff;
          text-align: center;
          padding: 6px;
          font-size: 12px;
          font-family: inherit;
          text-transform: uppercase;
          letter-spacing: 1px;
          flex-shrink: 0;
        "
      >
        Reconnecting...
      </div>
      <div id="terminal"></div>
      <div id="action-bar" class="visible">
        <button class="action-btn" onclick="sendKey('Enter')">Enter</button>
        <button class="action-btn" onclick="sendKey('Escape')">Esc</button>
        <button class="action-btn" onclick="sendKey('Up')" style="font-size:20px">&#9650;</button>
        <button class="action-btn" onclick="sendKey('Down')" style="font-size:20px">&#9660;</button>
        <button class="action-btn danger" onclick="closeSession()">^C</button>
      </div>
      <div id="input-bar">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="$ "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <button id="send-btn" onclick="sendMsg()">&#9889;</button>
      </div>
      <div id="msg-preview"></div>
    </div>

    <script>
      let currentSession = null;
      let currentMachine = ""; // "" = self, URL string = remote
      let currentView = "sessions";
      let pollTimer = null;
      let fastPoll = false;
      let allSessions = [];
      let sessionRefreshTimer = null;

      // ── Machine registry ──

      function getMachines() {
        try { return JSON.parse(localStorage.getItem("wolfpack-machines") || "[]"); }
        catch { return []; }
      }

      function saveMachines(list) {
        localStorage.setItem("wolfpack-machines", JSON.stringify(list));
      }

      async function addMachine(url) {
        url = url.replace(/\/+$/, "");
        const machines = getMachines();
        if (machines.some(m => m.url === url)) return machines;
        const resp = await fetch(url + "/api/info");
        const info = await resp.json();
        machines.push({ url, name: info.name || url });
        saveMachines(machines);
        return machines;
      }

      function removeMachine(url) {
        const machines = getMachines().filter(m => m.url !== url);
        saveMachines(machines);
        return machines;
      }

      // Self name, fetched once
      let selfName = "";
      (async () => {
        try {
          const resp = await fetch("/api/info");
          const info = await resp.json();
          selfName = info.name || "this machine";
        } catch { selfName = "this machine"; }
      })();

      async function api(path, opts, machineUrl) {
        const base = machineUrl ? machineUrl + "/api" : "/api";
        const res = await fetch(base + path, opts);
        return res.json();
      }

      function showView(name) {
        currentView = name;
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("visible"));
        document.getElementById(name + "-view").classList.add("visible");

        const back = document.getElementById("back-btn");
        const title = document.getElementById("header-title");

        const gear = document.getElementById("gear-btn");

        const switcher = document.getElementById("session-switcher");
        const wolfIcon = document.getElementById("wolf-icon");

        switcher.style.display = "none";
        document.getElementById("search-btn").style.display = "none";
        document.getElementById("header-machine-label").style.display = "none";

        // Stop session auto-refresh when leaving sessions view
        if (sessionRefreshTimer) {
          clearInterval(sessionRefreshTimer);
          sessionRefreshTimer = null;
        }

        if (name === "sessions") {
          back.style.display = "none";
          back.onclick = null;
          gear.style.display = "";
          title.textContent = "wolfpack";
          wolfIcon.style.display = "";
          // Auto-refresh session list every 5s
          sessionRefreshTimer = setInterval(loadSessions, 5000);
        } else if (name === "projects") {
          back.style.display = "block";
          back.onclick = () => {
            stopPolling();
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "new session";
          wolfIcon.style.display = "none";
        } else if (name === "settings") {
          back.style.display = "block";
          back.onclick = () => {
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "settings";
          wolfIcon.style.display = "none";
        } else if (name === "terminal") {
          back.style.display = "block";
          back.onclick = () => {
            stopPolling();
            closeSearch();
            currentSession = null;
            currentMachine = "";
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "";
          wolfIcon.style.display = "";
          switcher.style.display = "";
          document.getElementById("search-btn").style.display = "";
          const hml = document.getElementById("header-machine-label");
          if (getMachines().length > 0) {
            const mName = currentMachine
              ? (getMachines().find(m => m.url === currentMachine)?.name || "remote")
              : (selfName || "local");
            hml.textContent = mName;
            hml.style.display = "";
          }
          loadSessionSwitcher();
        }
      }

      // ── Sessions ──

      // Shared session groups cache for switcher reuse
      let lastSessionGroups = [];

      async function fetchSessionGroups() {
        const machines = getMachines();
        const fetches = [
          api("/sessions").then(d => ({ machine: { url: "", name: selfName || "this machine" }, sessions: d.sessions || [], online: true }))
            .catch(() => ({ machine: { url: "", name: selfName || "this machine" }, sessions: [], online: false })),
          ...machines.map(m =>
            api("/sessions", undefined, m.url)
              .then(d => ({ machine: m, sessions: d.sessions || [], online: true }))
              .catch(() => ({ machine: m, sessions: [], online: false }))
          )
        ];
        const groups = await Promise.all(fetches);
        groups.sort((a, b) => {
          if (!a.machine.url) return -1;
          if (!b.machine.url) return 1;
          return a.machine.name.localeCompare(b.machine.name);
        });
        lastSessionGroups = groups;
        allSessions = [];
        groups.forEach(g => g.sessions.forEach(s => allSessions.push({ ...s, machineUrl: g.machine.url, machineName: g.machine.name })));
        return groups;
      }

      async function loadSessions() {
        const el = document.getElementById("session-list");
        const machines = getMachines();
        const groups = await fetchSessionGroups();
        const multiMachine = machines.length > 0;

        // Single-machine: flat list like original
        if (!multiMachine) {
          const self = groups[0];
          let html = '<div class="new-btn" onclick="showProjectPicker()">+ New Session</div>';
          if (self && self.online && self.sessions.length) {
            html += self.sessions.map(s => {
              const lastLine = s.lastLine || "";
              const needsAttention = ATTENTION_PATTERNS.some(p => p.test(lastLine));
              const dotClass = needsAttention ? "yellow" : "green";
              return `<div class="card" onclick="openSession('${esc(s.name)}')">
                <div class="dot ${dotClass}"></div>
                <div class="card-info">
                  <div class="card-name">${esc(s.name)}</div>
                  <div class="card-preview">${esc(lastLine)}</div>
                </div>
                <button class="kill-btn" onclick="killSession('${esc(s.name)}', event)">&times;</button>
              </div>`;
            }).join("");
          }
          el.innerHTML = html;
          return;
        }

        // Multi-machine: grouped by machine
        let html = "";
        for (const g of groups) {
          const mUrl = esc(g.machine.url);
          const mName = esc(g.machine.name);
          const statusDot = g.online ? "green" : "red";
          html += `<div class="machine-group">`;
          html += `<div class="machine-header"><div class="dot ${statusDot}"></div>${mName}<button class="machine-add-btn" onclick="showProjectPicker('${mUrl}')">+</button></div>`;
          if (g.online && g.sessions.length) {
            html += g.sessions.map(s => {
              const lastLine = s.lastLine || "";
              const needsAttention = ATTENTION_PATTERNS.some(p => p.test(lastLine));
              const dotClass = needsAttention ? "yellow" : "green";
              return `<div class="card" onclick="openSession('${esc(s.name)}', '${mUrl}')">
                <div class="dot ${dotClass}"></div>
                <div class="card-info">
                  <div class="card-machine">${mName}</div>
                  <div class="card-name">${esc(s.name)}</div>
                  <div class="card-preview">${esc(lastLine)}</div>
                </div>
                <button class="kill-btn" onclick="killSession('${esc(s.name)}', event, '${mUrl}')">&times;</button>
              </div>`;
            }).join("");
          } else if (!g.online) {
            html += `<div style="padding:4px 4px;color:#555;font-size:11px">Offline</div>`;
          }
          html += `</div>`;
        }
        el.innerHTML = html;
      }

      function openSession(name, machineUrl) {
        currentSession = name;
        currentMachine = machineUrl || "";
        showView("terminal");
        document.getElementById("terminal").textContent = "";
        resizePane();
        startPolling();
      }

      async function resizePane() {
        if (!currentSession) return;
        const term = document.getElementById("terminal");
        const probe = document.createElement("span");
        probe.style.cssText =
          'position:absolute;visibility:hidden;white-space:pre;font-size:12px;line-height:1.4;font-family:inherit';
        probe.textContent = "X";
        document.body.appendChild(probe);
        const charW = probe.offsetWidth;
        const charH = probe.offsetHeight;
        document.body.removeChild(probe);
        if (!charW || !charH) return;
        const cols = Math.floor(term.clientWidth / charW);
        const rows = Math.floor(term.clientHeight / charH);
        if (cols > 0 && rows > 0) {
          await api("/resize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, cols, rows }),
          }, currentMachine);
        }
      }

      // ── Project picker ──

      let projectMachine = ""; // machine URL for project picker context

      async function showProjectPicker(machineUrl) {
        projectMachine = machineUrl || "";
        showView("projects");
        document.getElementById("new-project-name").value = "";
        const el = document.getElementById("project-list");
        el.innerHTML = '<div class="empty">Loading...</div>';

        try {
          const data = await api("/projects", undefined, projectMachine);
          if (!data.projects?.length) {
            el.innerHTML = '<div class="empty">No projects in ~/Dev</div>';
            return;
          }
          el.innerHTML = data.projects
            .map(
              (p) => `
      <div class="card" onclick="createSession('${esc(p)}')">
        <div class="dot blue"></div>
        <div class="card-name">${esc(p)}</div>
      </div>
    `,
            )
            .join("");
        } catch {
          el.innerHTML = '<div class="empty">Failed to load projects</div>';
        }
      }

      function showTerminalLoading(label) {
        showView("terminal");
        const term = document.getElementById("terminal");
        term.innerHTML = '<span class="loading-text">Starting session in ' + esc(label) + '\u2026</span>';
      }

      async function createSession(project) {
        const machine = projectMachine;
        showTerminalLoading(project);
        try {
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project }),
          }, machine);
          if (data.session) {
            currentSession = data.session;
            currentMachine = machine;
            loadSessionSwitcher();
            resizePane();
            startPolling();
          } else {
            showView("sessions");
            loadSessions();
          }
        } catch {
          showView("sessions");
          loadSessions();
        }
      }

      async function createNewProject() {
        const input = document.getElementById("new-project-name");
        const name = input.value.trim();
        if (!name) return;
        const machine = projectMachine;
        showTerminalLoading(name);
        try {
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ newProject: name }),
          }, machine);
          if (data.session) {
            currentSession = data.session;
            currentMachine = machine;
            loadSessionSwitcher();
            resizePane();
            startPolling();
          } else {
            showView("sessions");
            loadSessions();
          }
        } catch {
          showView("sessions");
          loadSessions();
        }
      }

      // ── Terminal ──

      function startPolling() {
        poll();
        schedulePoll();
      }

      function schedulePoll() {
        if (pollTimer) clearTimeout(pollTimer);
        const interval = fastPoll ? 200 : 1000;
        pollTimer = setTimeout(() => { poll().then(schedulePoll); }, interval);
      }

      function enterFastPoll() {
        fastPoll = true;
      }

      function stopPolling() {
        if (pollTimer) {
          clearTimeout(pollTimer);
          pollTimer = null;
        }
      }

      let pollFails = 0;

      async function poll() {
        if (!currentSession) return;
        try {
          const data = await api(
            "/poll?session=" + encodeURIComponent(currentSession),
            undefined, currentMachine,
          );
          pollFails = 0;
          const term = document.getElementById("terminal");
          const statusEl = document.getElementById("conn-status");
          if (statusEl) statusEl.style.display = "none";
          if (data.pane != null) {
            const changed = data.pane !== lastRawPane;
            lastRawPane = data.pane;
            if (changed) {
              fastPoll = false;
              // Clear Enter retry if pane changed
              if (enterRetryTimer) {
                clearTimeout(enterRetryTimer);
                enterRetryTimer = null;
              }
              const wasAtBottom =
                term.scrollHeight - term.scrollTop - term.clientHeight < 40;
              if (searchActive && searchTerm) {
                applySearchHighlights();
              } else {
                term.textContent = data.pane;
              }
              if (wasAtBottom) term.scrollTop = term.scrollHeight;
            }
            if (data.pane.trim()) checkForAttention(data.pane);
          }
        } catch {
          pollFails++;
          if (pollFails >= 3) {
            const statusEl = document.getElementById("conn-status");
            if (statusEl) statusEl.style.display = "block";
          }
        }
      }

      let enterRetryTimer = null;

      async function sendMsg() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text || !currentSession) return;
        const saved = text;
        input.value = "";
        autoResizeInput();
        document.getElementById("msg-preview").style.display = "none";

        // Flash send button
        const btn = document.getElementById("send-btn");
        btn.classList.remove("send-flash");
        void btn.offsetWidth; // force reflow
        btn.classList.add("send-flash");

        const paneBeforeSend = lastRawPane;
        try {
          await api("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, text: text.replace(/\n/g, " ") }),
          }, currentMachine);
          enterFastPoll();

          // Enter retry: if text is still on the prompt line after 2s, resend Enter
          const sentText = text.replace(/\n/g, " ");
          if (enterRetryTimer) clearTimeout(enterRetryTimer);
          enterRetryTimer = setTimeout(() => {
            if (currentSession && lastRawPane) {
              const lastLine = lastRawPane.trimEnd().split("\n").pop() || "";
              if (lastLine.includes(sentText)) {
                sendKey("Enter");
              }
            }
            enterRetryTimer = null;
          }, 2000);
        } catch {
          input.value = saved;
          autoResizeInput();
        }
      }

      function updatePreview() {
        const input = document.getElementById("msg-input");
        const preview = document.getElementById("msg-preview");
        if (input.scrollWidth > input.clientWidth) {
          preview.textContent = input.value;
          preview.style.display = "block";
        } else {
          preview.style.display = "none";
        }
      }

      async function sendKey(key) {
        if (!currentSession) return;
        await api("/key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: currentSession, key }),
        }, currentMachine);
        enterFastPoll();
      }

      async function killSession(name, e, machineUrl) {
        e.stopPropagation();
        if (!confirm(`Kill session "${name}"?`)) return;
        await api("/kill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: name }),
        }, machineUrl || "");
        loadSessions();
      }

      function loadSessionSwitcher() {
        const machines = getMachines();
        const groups = lastSessionGroups;
        const sel = document.getElementById("session-switcher");
        let opts = "";
        for (const g of groups) {
          for (const s of g.sessions) {
            const val = g.machine.url ? g.machine.url + "|" + s.name : s.name;
            const label = s.name;
            const selected = s.name === currentSession && g.machine.url === currentMachine ? "selected" : "";
            opts += `<option value="${esc(val)}" ${selected}>${esc(label)}</option>`;
          }
        }
        sel.innerHTML = opts;
      }

      function switchSession(val) {
        let name, machineUrl;
        // Values with | are remote: "url|sessionName"
        const pipeIdx = val.indexOf("|");
        if (pipeIdx !== -1) {
          machineUrl = val.substring(0, pipeIdx);
          name = val.substring(pipeIdx + 1);
        } else {
          machineUrl = "";
          name = val;
        }
        if (name === currentSession && machineUrl === currentMachine) return;
        stopPolling();
        currentSession = name;
        currentMachine = machineUrl;
        document.getElementById("terminal").textContent = "";
        resizePane();
        startPolling();
      }

      // ── Notifications ──

      let notificationsEnabled = false;
      let lastPaneText = "";

      function requestNotifications() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().then((p) => {
            notificationsEnabled = p === "granted";
          });
        } else if (
          "Notification" in window &&
          Notification.permission === "granted"
        ) {
          notificationsEnabled = true;
        }
      }

      const ATTENTION_PATTERNS = [
        /\? \(y\/n\)/i,
        /\[Y\/n\]/i,
        /\[yes\/no\]/i,
        /Do you want to/i,
        /Press Enter/i,
        /permission/i,
        /approve/i,
        /waiting for/i,
        /Error:/i,
        /error\[/i,
        /failed/i,
        /❌/,
      ];

      function checkForAttention(paneText) {
        if (!notificationsEnabled || !currentSession) return;
        if (document.visibilityState === "visible") return;

        const lastLines = paneText.trimEnd().split("\n").slice(-5).join("\n");
        if (lastLines === lastPaneText) return;
        lastPaneText = lastLines;

        for (const pat of ATTENTION_PATTERNS) {
          if (pat.test(lastLines)) {
            const machineName = currentMachine
              ? (getMachines().find(m => m.url === currentMachine)?.name || "remote")
              : (selfName || "local");
            const title = getMachines().length > 0
              ? `Wolfpack (${machineName}): ${currentSession}`
              : `Wolfpack: ${currentSession}`;
            new Notification(title, {
              body: lastLines.slice(-120),
              tag: "wolfpack-attention",
            });
            navigator.vibrate?.([200, 100, 200]);
            break;
          }
        }
      }

      requestNotifications();

      // Dismiss preview when tapping terminal area
      document.getElementById("terminal").addEventListener("click", () => {
        document.getElementById("msg-preview").style.display = "none";
      });

      // Auto-resize textarea as content grows
      function autoResizeInput() {
        const ta = document.getElementById("msg-input");
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      }

      const msgInput = document.getElementById("msg-input");
      msgInput.addEventListener("input", () => {
        autoResizeInput();
        updatePreview();
      });

      document
        .getElementById("new-project-name")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") createNewProject();
        });
      document.getElementById("machine-url-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addMachineFromInput();
      });

      // ── Settings ──

      async function showSettings() {
        showView("settings");
        renderMachinesList();
        // Show QR button if BarcodeDetector is available
        if ("BarcodeDetector" in window) {
          document.getElementById("qr-scan-btn").style.display = "";
        }
        const el = document.getElementById("preset-list");
        el.innerHTML = "";
        try {
          const data = await api("/settings");
          const current = data.settings?.agentCmd || "claude";
          document.getElementById("custom-cmd").value = current;

          const presets = Object.entries(data.presets || {});
          el.innerHTML = presets
            .map(
              ([label, cmd]) => `
      <button class="preset-btn ${cmd === current ? "selected" : ""}" onclick="selectPreset('${esc(cmd)}')">${esc(label)}</button>
    `,
            )
            .join("");
        } catch {}
      }

      async function renderMachinesList() {
        const machines = getMachines();
        const el = document.getElementById("machines-list");
        if (!machines.length) {
          el.innerHTML = '<div style="color:#444;font-size:12px;padding:6px 0">No remote machines added</div>';
          return;
        }
        // Check status of each machine
        const checks = await Promise.all(machines.map(m =>
          fetch(m.url + "/api/info", { signal: AbortSignal.timeout(3000) })
            .then(() => true).catch(() => false)
        ));
        el.innerHTML = machines.map((m, i) => {
          const dot = checks[i] ? "green" : "red";
          return `<div class="machine-item">
            <div class="dot ${dot}"></div>
            <span class="machine-item-name">${esc(m.name)}<span class="machine-item-url">${esc(m.url)}</span></span>
            <button class="machine-remove-btn" onclick="removeMachineUI('${esc(m.url)}')">&times;</button>
          </div>`;
        }).join("");
      }

      function removeMachineUI(url) {
        removeMachine(url);
        renderMachinesList();
      }

      async function addMachineFromInput() {
        const input = document.getElementById("machine-url-input");
        const errorEl = document.getElementById("machine-add-error");
        errorEl.textContent = "";
        const url = input.value.trim();
        if (!url) return;
        try {
          await addMachine(url);
          input.value = "";
          showView("sessions");
          loadSessions();
          return;
        } catch (e) {
          errorEl.textContent = "Failed to connect — check URL and ensure Wolfpack is running";
        }
      }

      // ── QR Scanner ──
      let qrStream = null;
      let qrAnimFrame = null;

      async function startQrScan() {
        const overlay = document.getElementById("qr-overlay");
        const video = document.getElementById("qr-video");
        overlay.classList.add("visible");
        try {
          qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          video.srcObject = qrStream;
          const detector = new BarcodeDetector({ formats: ["qr_code"] });
          const scanFrame = async () => {
            if (!qrStream) return;
            try {
              const barcodes = await detector.detect(video);
              if (barcodes.length > 0) {
                const raw = barcodes[0].rawValue;
                if (raw && (raw.startsWith("http://") || raw.startsWith("https://"))) {
                  stopQrScan();
                  document.getElementById("machine-url-input").value = raw;
                  try {
                    await addMachine(raw);
                    document.getElementById("machine-url-input").value = "";
                    showView("sessions");
                    loadSessions();
                  } catch {
                    document.getElementById("machine-add-error").textContent = "QR detected but failed to connect";
                  }
                  return;
                }
              }
            } catch {}
            qrAnimFrame = requestAnimationFrame(scanFrame);
          };
          qrAnimFrame = requestAnimationFrame(scanFrame);
        } catch {
          stopQrScan();
        }
      }

      function stopQrScan() {
        if (qrAnimFrame) { cancelAnimationFrame(qrAnimFrame); qrAnimFrame = null; }
        if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
        const overlay = document.getElementById("qr-overlay");
        overlay.classList.remove("visible");
        document.getElementById("qr-video").srcObject = null;
      }

      async function selectPreset(cmd) {
        await api("/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentCmd: cmd }),
        });
        showSettings();
      }

      async function saveCustomCmd() {
        const cmd = document.getElementById("custom-cmd").value.trim();
        if (!cmd) return;
        await api("/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agentCmd: cmd }),
        });
        showSettings();
      }

      // ── Search ──

      let searchActive = false;
      let searchTerm = "";
      let searchMatches = [];
      let searchIndex = -1;
      let lastRawPane = "";

      function toggleSearch() {
        const bar = document.getElementById("search-bar");
        if (searchActive) {
          closeSearch();
        } else {
          searchActive = true;
          bar.classList.add("visible");
          document.getElementById("search-input").focus();
        }
      }

      function closeSearch() {
        searchActive = false;
        searchTerm = "";
        searchMatches = [];
        searchIndex = -1;
        document.getElementById("search-bar").classList.remove("visible");
        document.getElementById("search-input").value = "";
        document.getElementById("search-count").textContent = "";
        const term = document.getElementById("terminal");
        if (lastRawPane) term.textContent = lastRawPane;
      }

      function doSearch() {
        searchTerm = document.getElementById("search-input").value;
        if (!searchTerm) {
          document.getElementById("search-count").textContent = "";
          const term = document.getElementById("terminal");
          if (lastRawPane) term.textContent = lastRawPane;
          searchMatches = [];
          searchIndex = -1;
          return;
        }
        searchIndex = 0;
        applySearchHighlights();
      }

      function applySearchHighlights() {
        const term = document.getElementById("terminal");
        if (!searchTerm || !lastRawPane) return;
        const escaped = lastRawPane.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const re = new RegExp(escapedTerm.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"), "gi");
        let count = 0;
        let current = searchIndex;
        const html = escaped.replace(re, (m) => {
          const cls = count === current ? "search-current" : "";
          count++;
          return `<mark class="${cls}">${m}</mark>`;
        });
        searchMatches = Array.from({ length: count });
        if (count > 0 && searchIndex >= count) searchIndex = 0;
        document.getElementById("search-count").textContent = count > 0 ? `${searchIndex + 1}/${count}` : "0/0";
        term.innerHTML = html;
        const cur = term.querySelector("mark.search-current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      function nextMatch() {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex + 1) % searchMatches.length;
        applySearchHighlights();
      }

      function prevMatch() {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
        applySearchHighlights();
      }

      async function closeSession() {
        const session = currentSession;
        const machine = currentMachine;
        stopPolling();
        closeSearch();
        currentSession = null;
        currentMachine = "";
        showView("sessions");
        if (session) {
          await api("/kill", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session }),
          }, machine);
        }
        loadSessions();
      }

      // Ctrl+C closes session and returns to main menu
      document.addEventListener("keydown", (e) => {
        if (e.key === "c" && (e.ctrlKey || e.metaKey) && currentView === "terminal") {
          e.preventDefault();
          closeSession();
        }
      });

      document.getElementById("search-input").addEventListener("input", doSearch);
      document.getElementById("search-input").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSearch();
        else if (e.key === "Enter") {
          e.preventDefault();
          if (e.shiftKey) prevMatch(); else nextMatch();
        }
      });

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
      }

      // Re-poll immediately when returning from background tab
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && currentSession && currentView === "terminal") {
          poll();
          enterFastPoll();
          schedulePoll();
        }
      });

      loadSessions();

      // SW removed — lets Brave use "Add to Home screen" with name prompt
      // while manifest display:standalone still hides address bar
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs =>
          regs.forEach(r => r.unregister())
        );
      }
    </script>
  </body>
</html>
