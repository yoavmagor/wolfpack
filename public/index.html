<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <title>Wolfpack</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Mono", "SF Mono", "Consolas", monospace;
        background: #0a0a0a;
        color: #b0b0b0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 14px;
      }
      header {
        padding: 8px 12px;
        background: #111;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 48px;
        flex-shrink: 0;
        border-bottom: 1px solid #222;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: start;
      }
      .header-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-self: center;
      }
      header h1 {
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #00ff41;
        white-space: nowrap;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: end;
      }
      .back-btn {
        display: none;
        background: none;
        border: 1px solid #00ff41;
        color: #00ff41;
        font-size: 11px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 2px;
        transition: all 0.15s ease;
        min-height: 34px;
        -webkit-tap-highlight-color: transparent;
      }
      .back-btn:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .view {
        display: none;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .view.visible {
        display: flex;
      }

      .list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .card {
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 12px 14px;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .card:active {
        background: #1a1a1a;
        border-color: #00ff41;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.green {
        background: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .dot.blue {
        background: #00ff41;
      }
      .dot.gray {
        background: #333;
      }
      .card-machine {
        font-size: 9px;
        color: #383838;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .card-name {
        font-size: 13px;
        font-weight: 800;
        color: #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .card-preview {
        font-size: 12px;
        color: #555;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .new-btn {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        color: #00ff41;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .new-btn:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      #terminal {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre;
        color: #b0b0b0;
        background: #0a0a0a;
        -webkit-overflow-scrolling: touch;
      }

      #action-bar {
        display: none;
        gap: 6px;
        padding: 8px 10px;
        background: #111;
        border-top: 1px solid #222;
        flex-wrap: wrap;
      }
      #action-bar.visible {
        display: flex;
      }
      .action-btn {
        background: none;
        border: 1px solid #333;
        border-radius: 2px;
        padding: 10px 16px;
        min-height: 44px;
        min-width: 44px;
        color: #b0b0b0;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .action-btn:active {
        background: #b0b0b0;
        color: #0a0a0a;
      }
      .action-btn.primary {
        border-color: #00ff41;
        color: #00ff41;
      }
      .action-btn.primary:active {
        background: #00ff41;
        color: #0a0a0a;
      }
      .action-btn.danger {
        border-color: #cc3333;
        color: #cc3333;
      }
      .action-btn.danger:active {
        background: #cc3333;
        color: #0a0a0a;
      }

      #input-bar {
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        background: #111;
        border-top: 1px solid #222;
        flex-shrink: 0;
      }
      #input-bar textarea {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 16px;
        font-family: inherit;
        outline: none;
        resize: none;
        overflow-y: auto;
        line-height: 1.4;
        max-height: 120px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      #input-bar textarea:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      #msg-preview {
        display: none;
        position: fixed;
        bottom: 60px;
        left: 10px;
        right: 10px;
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 12px;
        color: #b0b0b0;
        font-size: 14px;
        font-family: inherit;
        white-space: pre-wrap;
        max-height: 50vh;
        overflow-y: auto;
        z-index: 10;
      }
      #input-bar button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        width: 44px;
        height: 44px;
        color: #00ff41;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        align-self: flex-end;
        transition: all 0.15s ease;
      }
      #input-bar button:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .new-project-row {
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #111;
        border-bottom: 1px solid #222;
      }
      .new-project-row input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .new-project-row input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      .new-project-row button {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        padding: 8px 16px;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .new-project-row button:active {
        background: #00ff41;
        color: #0a0a0a;
      }

      .empty {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #333;
      }

      .settings-section {
        padding: 12px;
      }
      .settings-label {
        font-size: 11px;
        color: #555;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .session-select {
        background: transparent;
        border: none;
        color: #00ff41;
        font-size: 13px;
        font-family: inherit;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3px;
        padding: 0;
        outline: none;
        max-width: 200px;
        -webkit-appearance: none;
        appearance: none;
      }
      .kill-btn {
        background: none;
        border: none;
        color: #cc3333;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        margin-left: auto;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.15s ease;
      }
      .kill-btn:active {
        color: #ff4444;
      }
      .loading-text {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #555;
        font-size: 13px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes send-flash {
        0% { background: #00ff41; color: #0a0a0a; }
        100% { background: none; color: #00ff41; }
      }
      .send-flash {
        animation: send-flash 0.3s ease-out;
      }
      .settings-gear {
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        color: #b0b0b0;
        font-size: 22px;
        cursor: pointer;
        padding: 6px;
        min-width: 40px;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .settings-gear:active {
        background: #00ff41;
        color: #0a0a0a;
      }
      .search-btn {
        background: none;
        border: none;
        color: #555;
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        transition: color 0.15s ease;
      }
      .search-btn:active {
        color: #00ff41;
      }
      #search-bar {
        display: none;
        position: absolute;
        top: 48px;
        left: 0;
        right: 0;
        z-index: 20;
        background: #111;
        border-bottom: 1px solid #222;
        padding: 8px 10px;
        gap: 8px;
        align-items: center;
      }
      #search-bar.visible {
        display: flex;
      }
      #search-bar input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 6px 10px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      #search-bar input:focus {
        border-color: #00ff41;
        box-shadow: 0 0 6px #00ff4180;
      }
      #search-bar button {
        background: none;
        border: 1px solid #333;
        border-radius: 2px;
        color: #b0b0b0;
        font-size: 13px;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      #search-bar button:active {
        background: #b0b0b0;
        color: #0a0a0a;
      }
      #search-count {
        color: #555;
        font-size: 11px;
        white-space: nowrap;
      }
      #terminal mark, #desktop-terminal mark {
        background: #6e5c00;
        color: #e0e0e0;
        border-radius: 2px;
      }
      #terminal mark.search-current, #desktop-terminal mark.search-current {
        background: #ff6600;
        color: #fff;
      }
      .dot.yellow {
        background: #ff6600;
        animation: dot-pulse 1.5s ease-in-out infinite;
      }
      .dot.red { background: #cc3333; }
      @keyframes dot-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .machine-group { margin-bottom: 6px; }
      .machine-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 4px 3px;
        font-size: 10px;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .machine-header .dot { width: 6px; height: 6px; }
      .machine-add-btn {
        margin-left: auto;
        background: none;
        border: 1px solid #00ff41;
        border-radius: 2px;
        color: #00ff41;
        font-size: 14px;
        font-weight: 700;
        width: 26px;
        height: 26px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .machine-add-btn:active { background: #00ff41; color: #0a0a0a; }
      .machine-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        margin-bottom: 6px;
      }
      .machine-item .dot { width: 8px; height: 8px; }
      .machine-item-name { flex: 1; font-size: 13px; color: #b0b0b0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
      .machine-item-url { font-size: 11px; color: #444; margin-left: 4px; }
      .machine-remove-btn {
        background: none;
        border: none;
        color: #cc3333;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
        -webkit-tap-highlight-color: transparent;
      }
      .machine-remove-btn:active { color: #ff4444; }

      /* Ralph loop styles */
      .ralph-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 2px;
        padding: 12px 14px;
        margin-bottom: 6px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .ralph-card.running { border-left: 3px solid #00ff41; }
      .ralph-card.cleanup { border-left: 3px solid #3498db; }
      .ralph-card.done { border-left: 3px solid #00ff41; }
      .ralph-card.limit { border-left: 3px solid #ff6600; }
      .ralph-card.idle { border-left: 3px solid #333; }
      .ralph-card:active {
        background: #1a1a1a;
        border-top-color: #9b59b6;
        border-right-color: #9b59b6;
        border-bottom-color: #9b59b6;
      }
      .ralph-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      .ralph-card-name {
        font-size: 14px;
        color: #e0e0e0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ralph-progress {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ralph-bar {
        flex: 1;
        height: 4px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      .ralph-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      .ralph-bar-fill.running { background: #00ff41; }
      .ralph-bar-fill.cleanup { background: #3498db; }
      .ralph-bar-fill.done { background: #00ff41; }
      .ralph-bar-fill.limit { background: #ff6600; }
      .ralph-bar-fill.idle { background: #333; }
      .ralph-iter {
        font-size: 11px;
        color: #666;
        white-space: nowrap;
      }
      .ralph-status {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 2px;
      }
      .ralph-status.running { color: #00ff41; background: #00ff4115; }
      .ralph-status.cleanup { color: #3498db; background: #3498db15; }
      .ralph-status.done { color: #00ff41; background: #00ff4115; }
      .ralph-status.idle { color: #555; background: #55555515; }
      .ralph-status.limit { color: #ff6600; background: #ff660015; }
      .ralph-status.failed { color: #cc3333; }
      .dot.purple {
        background: #9b59b6;
        box-shadow: 0 0 6px #9b59b680;
        animation: dot-pulse 1.5s ease-in-out infinite;
      }
      .ralph-last-output {
        font-size: 11px;
        color: #555;
        margin-top: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ralph-detail-header {
        padding: 12px 14px;
        border-bottom: 1px solid #222;
      }
      .ralph-log {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 11px;
        color: #888;
        white-space: pre-wrap;
        word-break: break-all;
        -webkit-overflow-scrolling: touch;
      }
      .ralph-actions {
        display: flex;
        gap: 8px;
        padding: 10px 14px;
        border-top: 1px solid #222;
      }
      .ralph-actions button {
        flex: 1;
        padding: 10px;
        border: 1px solid #333;
        border-radius: 2px;
        background: #111;
        color: #b0b0b0;
        font-size: 13px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .ralph-actions button:active { background: #1a1a1a; }
      .ralph-actions button.danger { border-color: #cc3333; color: #cc3333; }
      .ralph-actions button.danger:active { background: #1a0a0a; }
      .ralph-start-form {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .ralph-start-form label {
        font-size: 11px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .ralph-start-form select,
      .ralph-start-form input {
        width: 100%;
        padding: 10px;
        background: #111;
        border: 1px solid #333;
        border-radius: 2px;
        color: #e0e0e0;
        font-size: 14px;
        box-sizing: border-box;
      }
      .ralph-start-form select:focus,
      .ralph-start-form input:focus {
        border-color: #9b59b6;
        outline: none;
      }
      .ralph-launch-btn {
        padding: 12px;
        background: #9b59b6;
        border: none;
        border-radius: 2px;
        color: #fff;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .ralph-launch-btn:active { background: #8e44ad; }
      .ralph-empty {
        text-align: center;
        color: #444;
        padding: 40px 14px;
        font-size: 13px;
      }
      .ralph-nav-btn {
        background: none;
        border: 1px solid #9b59b6;
        border-radius: 2px;
        color: #b0b0b0;
        font-size: 18px;
        cursor: pointer;
        padding: 6px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: all 0.15s ease;
      }
      .ralph-nav-btn:active { background: #1a1a1a; }
      #desktop-terminal {
        display: none;
        flex: 1;
        min-height: 0;
        margin: 0;
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace;
        font-size: 13px;
        line-height: 1.4;
        padding: 4px 8px;
        overflow-y: auto;
        white-space: pre;
        user-select: text;
        -webkit-user-select: text;
      }
    </style>
    <script src="/ansi_up.min.js"></script>
  </head>
  <body>
    <header>
      <div class="header-left">
        <button class="back-btn" id="back-btn">&lt; BACK</button>
      </div>
      <div class="header-center" id="header-center">
        <div style="display:flex;align-items:center;gap:8px">
          <img id="wolf-icon" src="/wolf-face.png" width="60" height="60" alt="wolfpack" style="object-fit:contain;filter:invert(1) brightness(2);margin:-22px -4px -18px -8px" />
          <h1 id="header-title">wolfpack</h1>
          <select
            id="session-switcher"
            class="session-select"
            style="display: none"
            onchange="switchSession(this.value)"
          ></select>
        </div>
      </div>
      <div class="header-right">
        <div id="header-machine-label" style="display:none;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;line-height:1"></div>
        <button class="ralph-nav-btn" id="ralph-btn" onclick="showView('ralph')" style="display:none">&#129355;</button>
        <button class="search-btn" id="search-btn" onclick="toggleSearch()">&#128269;</button>
        <button class="settings-gear" id="gear-btn" onclick="showSettings()">&#9881;</button>
      </div>
    </header>

    <!-- Sessions view -->
    <div id="sessions-view" class="view visible">
      <div id="session-list" class="list"></div>
    </div>

    <!-- Project picker view -->
    <div id="projects-view" class="view">
      <div class="new-project-row">
        <input
          id="new-project-name"
          type="text"
          placeholder="new project name..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        />
        <button onclick="selectNewProject()">Create</button>
      </div>
      <div id="project-list" class="list"></div>
    </div>

    <!-- Agent picker view -->
    <div id="agent-view" class="view">
      <div id="agent-list" class="list"></div>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="view">
      <div class="list">
        <div class="settings-section">
          <div class="settings-label">Machines</div>
          <div id="machines-list"></div>
          <button onclick="discoverMachines()" style="margin-top:12px;background:none;border:1px solid #00ff41;border-radius:2px;padding:10px 20px;color:#00ff41;font-size:13px;font-family:inherit;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.15s ease;width:100%">Discover Tailnet</button>
          <div id="discover-status" style="margin-top:6px;font-size:11px;color:#555"></div>
        </div>
        <div class="settings-section">
          <div class="settings-label">About</div>
          <div id="settings-version" style="font-size:12px;color:#666;padding:4px 0"></div>
        </div>
      </div>
    </div>

    <!-- Terminal view -->
    <div id="terminal-view" class="view">
      <div id="search-bar">
        <input id="search-input" type="text" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <span id="search-count"></span>
        <button onclick="prevMatch()">&#9650;</button>
        <button onclick="nextMatch()">&#9660;</button>
        <button onclick="closeSearch()">&#10005;</button>
      </div>
      <div
        id="conn-status"
        style="
          display: none;
          background: #cc3333;
          color: #fff;
          text-align: center;
          padding: 6px;
          font-size: 12px;
          font-family: inherit;
          text-transform: uppercase;
          letter-spacing: 1px;
          flex-shrink: 0;
        "
      >
        Reconnecting...
      </div>
      <div id="terminal"></div>
      <pre id="desktop-terminal"></pre>
      <div id="action-bar" class="visible">
        <button class="action-btn" onclick="sendKey('Enter')">Enter</button>
        <button class="action-btn" onclick="sendKey('Escape')">Esc</button>
        <button class="action-btn" onclick="sendKey('Up')" style="font-size:20px">&#9650;</button>
        <button class="action-btn" onclick="sendKey('Down')" style="font-size:20px">&#9660;</button>
        <button class="action-btn danger" onclick="confirmKillSession()">^C</button>
      </div>
      <div id="input-bar">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="$ "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        ></textarea>
        <button id="send-btn" onclick="sendMsg()">&#9889;</button>
      </div>
      <div id="msg-preview"></div>
    </div>

    <!-- Ralph loops list view -->
    <div id="ralph-view" class="view">
      <div id="ralph-list" class="list"></div>
      <button class="ralph-launch-btn" onclick="showView('ralph-start')">+ Start Ralph Loop</button>
    </div>

    <!-- Ralph detail view -->
    <div id="ralph-detail-view" class="view">
      <div id="ralph-detail-header" class="ralph-detail-header"></div>
      <pre id="ralph-log" class="ralph-log"></pre>
      <div id="ralph-actions" class="ralph-actions"></div>
    </div>

    <!-- Ralph start form view -->
    <div id="ralph-start-view" class="view">
      <div class="ralph-start-form">
        <label for="ralph-project-select">Project</label>
        <select id="ralph-project-select"></select>

        <label for="ralph-iterations-input">Iterations</label>
        <input
          id="ralph-iterations-input"
          type="number"
          min="1"
          max="50"
          value="5"
          autocomplete="off"
        />

        <label for="ralph-agent-select">Agent</label>
        <select id="ralph-agent-select">
          <option value="claude">claude</option>
          <option value="codex">codex</option>
          <option value="gemini">gemini</option>
        </select>

        <label for="ralph-plan-select">Plan file</label>
        <select id="ralph-plan-select"></select>

        <div style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="ralph-branch-toggle" onchange="toggleBranchFields()" style="width:auto;accent-color:#9b59b6" />
          <label for="ralph-branch-toggle" style="margin:0;cursor:pointer">New branch</label>
        </div>
        <div id="ralph-branch-fields" style="display:none;flex-direction:column;gap:12px">
          <label for="ralph-branch-name">Branch name</label>
          <input id="ralph-branch-name" type="text" placeholder="feature/my-branch" autocomplete="off" autocorrect="off" autocapitalize="off" />
          <label for="ralph-source-branch">Branch from</label>
          <select id="ralph-source-branch"></select>
        </div>

        <button class="ralph-launch-btn" onclick="startRalph()">Launch Ralph</button>
      </div>
    </div>

    <script>
      let currentSession = null;
      let currentMachine = ""; // "" = self, URL string = remote
      let currentView = "sessions";
      let pollTimer = null;
      let fastPoll = false;
      let allSessions = [];
      let sessionRefreshTimer = null;
      let ralphRefreshTimer = null;
      let currentRalphProject = null;
      let ralphLogPollTimer = null;
      let currentRalphPlanFile = "";
      let desktopAnsiUp = null;
      let desktopWs = null;
      let desktopResizeHandler = null;
      let useDesktopTerminal = false;
      let desktopRawAnsi = null;  // raw ANSI string from server (for search)

      function isDesktop() {
        return !('ontouchstart' in window) && window.innerWidth > 768;
      }

      // ── Machine registry ──

      function getMachines() {
        try { return JSON.parse(localStorage.getItem("wolfpack-machines") || "[]"); }
        catch { return []; }
      }

      function saveMachines(list) {
        localStorage.setItem("wolfpack-machines", JSON.stringify(list));
      }

      function removeMachine(url) {
        const machines = getMachines().filter(m => m.url !== url);
        saveMachines(machines);
        return machines;
      }

      // Self info, fetched once
      let selfName = "";
      let selfVersion = "";
      (async () => {
        try {
          const resp = await fetch("/api/info");
          const info = await resp.json();
          selfName = info.name || "this machine";
          selfVersion = info.version || "";
          // Show version in header
          const vEl = document.getElementById("settings-version");
          if (vEl && selfVersion) vEl.textContent = "wolfpack v" + selfVersion;
        } catch { selfName = "this machine"; }
        // Auto-discover wolfpack peers on tailnet
        try {
          const d = await api("/discover");
          const peers = d.peers || [];
          if (peers.length) {
            const machines = getMachines();
            let added = 0;
            for (const p of peers) {
              if (!machines.some(m => m.url === p.url)) {
                machines.push({ url: p.url, name: p.name || p.hostname });
                added++;
              }
            }
            if (added > 0) { saveMachines(machines); loadSessions(); }
          }
        } catch {}
      })();

      async function api(path, opts, machineUrl) {
        const base = machineUrl ? machineUrl + "/api" : "/api";
        const res = await fetch(base + path, opts);
        if (!res.ok) {
          const body = await res.text();
          try { return JSON.parse(body); } catch {}
          throw new Error(`HTTP ${res.status}: ${body.slice(0, 200)}`);
        }
        return res.json();
      }

      function showView(name) {
        currentView = name;
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("visible"));
        document.getElementById(name + "-view").classList.add("visible");

        const back = document.getElementById("back-btn");
        const title = document.getElementById("header-title");

        const gear = document.getElementById("gear-btn");
        const ralphBtn = document.getElementById("ralph-btn");

        const switcher = document.getElementById("session-switcher");
        const wolfIcon = document.getElementById("wolf-icon");
        const headerCenter = document.getElementById("header-center");

        switcher.style.display = "none";
        title.style.cursor = "";
        title.onclick = null;
        document.getElementById("search-btn").style.display = "none";
        document.getElementById("header-machine-label").style.display = "none";
        headerCenter.style.transform = "";
        ralphBtn.style.display = "none";

        // Stop session auto-refresh when leaving sessions view
        if (sessionRefreshTimer) {
          clearInterval(sessionRefreshTimer);
          sessionRefreshTimer = null;
        }
        // Stop ralph timers when leaving ralph views
        if (ralphRefreshTimer) {
          clearInterval(ralphRefreshTimer);
          ralphRefreshTimer = null;
        }
        if (ralphLogPollTimer) {
          clearInterval(ralphLogPollTimer);
          ralphLogPollTimer = null;
        }

        if (name === "sessions") {
          back.style.display = "none";
          back.onclick = null;
          gear.style.display = "";
          ralphBtn.style.display = "";
          title.textContent = "wolfpack";
          wolfIcon.style.display = "";
          // Auto-refresh session list every 5s
          sessionRefreshTimer = setInterval(loadSessions, 5000);
        } else if (name === "projects") {
          back.style.display = "block";
          back.onclick = () => {
            stopPolling();
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "select project";
          wolfIcon.style.display = "none";
        } else if (name === "agent") {
          back.style.display = "block";
          back.onclick = () => {
            showView("projects");
          };
          gear.style.display = "none";
          title.textContent = "select agent";
          wolfIcon.style.display = "none";
        } else if (name === "settings") {
          back.style.display = "block";
          back.onclick = () => {
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "settings";
          wolfIcon.style.display = "none";
        } else if (name === "terminal") {
          back.style.display = "block";
          back.onclick = () => {
            if (useDesktopTerminal) {
              destroyDesktopTerminal();
            } else {
              stopPolling();
            }
            closeSearch();
            useDesktopTerminal = false;
            currentSession = null;
            currentMachine = "";
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = currentSession || "";
          title.style.cursor = "pointer";
          title.onclick = () => { title.style.display = "none"; switcher.style.display = ""; switcher.focus(); };
          wolfIcon.style.display = "";
          switcher.style.display = "none";
          headerCenter.style.transform = "";
          document.getElementById("search-btn").style.display = "";
          const hml = document.getElementById("header-machine-label");
          if (getMachines().length > 0) {
            const mName = currentMachine
              ? (getMachines().find(m => m.url === currentMachine)?.name || "remote")
              : (selfName || "local");
            hml.textContent = mName;
            hml.style.display = "";
          }
          loadSessionSwitcher();
        } else if (name === "ralph") {
          back.style.display = "block";
          back.onclick = () => {
            showView("sessions");
            loadSessions();
          };
          gear.style.display = "none";
          title.textContent = "ralph loops";
          wolfIcon.style.display = "none";
          loadRalphLoops();
          ralphRefreshTimer = setInterval(loadRalphLoops, 3000);
        } else if (name === "ralph-detail") {
          back.style.display = "block";
          back.onclick = () => {
            showView("ralph");
          };
          gear.style.display = "none";
          title.textContent = currentRalphProject || "ralph";
          wolfIcon.style.display = "none";
          refreshRalphDetail();
          ralphLogPollTimer = setInterval(refreshRalphDetail, 2000);
        } else if (name === "ralph-start") {
          back.style.display = "block";
          back.onclick = () => {
            showView("ralph");
          };
          gear.style.display = "none";
          title.textContent = "start ralph";
          wolfIcon.style.display = "none";
          loadRalphStartForm();
        }
      }

      // ── Ralph Loop Functions ──

      async function loadRalphLoops() {
        const el = document.getElementById("ralph-list");
        try {
          const data = await api("/ralph");
          const loops = data.loops || [];
          if (loops.length === 0) {
            el.innerHTML = '<div class="ralph-empty">no ralph loops detected</div>';
            return;
          }
          // sort: active first, then by started desc
          loops.sort((a, b) => {
            if (a.active !== b.active) return a.active ? -1 : 1;
            return (b.started || "").localeCompare(a.started || "");
          });
          el.innerHTML = loops.map(loop => {
            const hitLimit = !loop.active && !loop.completed && loop.finished;
            const status = loop.cleanup ? "cleanup" : loop.active ? "running" : loop.completed ? "done" : hitLimit ? "limit" : "idle";
            const statusLabel = loop.cleanup ? "CLEANUP" : loop.active ? "RUNNING" : loop.completed ? "DONE" : hitLimit ? "STOPPED" : "IDLE";
            const dotClass = loop.active ? "purple" : "gray";
            const taskPct = loop.tasksTotal > 0 ? Math.round((loop.tasksDone / loop.tasksTotal) * 100) : 0;
            const taskLabel = loop.tasksDone + '/' + loop.tasksTotal + ' tasks';
            const iterLabel = loop.totalIterations > 0 ? loop.iteration + '/' + loop.totalIterations + ' iter' : '';
            const lastOut = loop.lastOutput ? '<div class="ralph-last-output">' + esc(loop.lastOutput) + '</div>' : '';
            return '<div class="ralph-card ' + status + '" onclick="openRalphDetail(\'' + escAttr(loop.project) + '\')">' +
              '<div class="ralph-card-header">' +
                '<span class="ralph-card-name"><span class="dot ' + dotClass + '"></span>' + esc(loop.project) + '</span>' +
                '<span class="ralph-status ' + status + '">' + statusLabel + '</span>' +
                '<button class="kill-btn" onclick="dismissRalph(\'' + escAttr(loop.project) + '\', event)">&times;</button>' +
              '</div>' +
              '<div class="ralph-progress">' +
                '<div class="ralph-bar"><div class="ralph-bar-fill ' + status + '" style="width:' + taskPct + '%"></div></div>' +
                '<span class="ralph-iter">' + taskLabel + '</span>' +
              '</div>' +
              (iterLabel ? '<div class="ralph-iter" style="text-align:right;margin-top:2px">' + iterLabel + '</div>' : '') +
              lastOut +
            '</div>';
          }).join("");
        } catch (e) {
          el.innerHTML = '<div class="ralph-empty">failed to load ralph loops</div>';
        }
      }

      function openRalphDetail(project) {
        currentRalphProject = project;
        showView("ralph-detail");
      }

      async function refreshRalphDetail() {
        if (!currentRalphProject) return;
        const header = document.getElementById("ralph-detail-header");
        const logEl = document.getElementById("ralph-log");
        const actions = document.getElementById("ralph-actions");
        try {
          const data = await api("/ralph");
          const loop = (data.loops || []).find(l => l.project === currentRalphProject);
          if (!loop) {
            header.innerHTML = '<span class="ralph-status failed">NOT FOUND</span>';
            logEl.textContent = "no ralph log for this project";
            actions.innerHTML = '';
            return;
          }
          const hitLimit = !loop.active && !loop.completed && loop.finished;
          const status = loop.cleanup ? "cleanup" : loop.active ? "running" : loop.completed ? "done" : hitLimit ? "limit" : "idle";
          const statusLabel = loop.cleanup ? "CLEANUP" : loop.active ? "RUNNING" : loop.completed ? "DONE" : hitLimit ? "STOPPED" : "IDLE";
          const taskPct = loop.tasksTotal > 0 ? Math.round((loop.tasksDone / loop.tasksTotal) * 100) : 0;
          const taskLabel = loop.tasksDone + '/' + loop.tasksTotal + ' tasks';
          const iterLabel = loop.totalIterations > 0 ? loop.iteration + '/' + loop.totalIterations + ' iter' : '';
          header.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
              '<span class="ralph-status ' + status + '">' + statusLabel + '</span>' +
              '<div style="display:flex;gap:12px">' +
                '<span class="ralph-iter">' + taskLabel + '</span>' +
                (iterLabel ? '<span class="ralph-iter">' + iterLabel + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="ralph-progress">' +
              '<div class="ralph-bar"><div class="ralph-bar-fill ' + status + '" style="width:' + taskPct + '%"></div></div>' +
            '</div>' +
            (loop.planFile ? '<div style="color:#888;font-size:12px;margin-top:4px">plan: ' + esc(loop.planFile) + '</div>' : '') +
            (loop.started ? '<div style="color:#888;font-size:12px">started: ' + esc(loop.started) + '</div>' : '') +
            (loop.finished ? '<div style="color:#888;font-size:12px">finished: ' + esc(loop.finished) + '</div>' : '');

          // actions
          if (loop.active) {
            actions.innerHTML = '<button class="ralph-launch-btn" style="background:#e74c3c" onclick="cancelRalph()">Cancel</button>';
          } else {
            actions.innerHTML = '<button class="ralph-launch-btn" onclick="restartRalph(\'' + escAttr(loop.planFile || '') + '\')">Restart</button>';
          }

          // stop polling if loop finished
          if (!loop.active && ralphLogPollTimer) {
            clearInterval(ralphLogPollTimer);
            ralphLogPollTimer = null;
          }
        } catch {
          header.innerHTML = '<span class="ralph-status failed">ERROR</span>';
        }

        // fetch log
        try {
          const logData = await api("/ralph/log?project=" + encodeURIComponent(currentRalphProject));
          if (logData.log != null) {
            const wasScrolled = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
            logEl.textContent = logData.log;
            if (wasScrolled) logEl.scrollTop = logEl.scrollHeight;
          }
        } catch {}
      }

      async function cancelRalph() {
        if (!currentRalphProject) return;
        if (!confirm("cancel ralph loop for " + currentRalphProject + "?")) return;
        try {
          await api("/ralph/cancel", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project: currentRalphProject }),
          });
          refreshRalphDetail();
        } catch (e) {
          alert("failed to cancel: " + e.message);
        }
      }

      async function loadRalphStartForm() {
        const sel = document.getElementById("ralph-project-select");
        try {
          const data = await api("/projects");
          const projects = data.projects || [];
          sel.innerHTML = projects.map(p => '<option value="' + esc(p) + '">' + esc(p) + '</option>').join("");
          if (currentRalphProject && projects.includes(currentRalphProject)) {
            sel.value = currentRalphProject;
          }
        } catch {
          sel.innerHTML = '<option value="">failed to load projects</option>';
        }
        sel.onchange = function() {
          loadPlanFiles(sel.value);
          if (document.getElementById("ralph-branch-toggle").checked) {
            loadBranches(sel.value);
          }
        };
        // Reset branch toggle on form load
        document.getElementById("ralph-branch-toggle").checked = false;
        document.getElementById("ralph-branch-fields").style.display = "none";
        await loadPlanFiles(sel.value);
        if (currentRalphPlanFile) {
          document.getElementById("ralph-plan-select").value = currentRalphPlanFile;
          currentRalphPlanFile = "";
        }
      }

      async function loadPlanFiles(project) {
        const planSel = document.getElementById("ralph-plan-select");
        if (!project) { planSel.innerHTML = '<option value="">select a project first</option>'; return; }
        try {
          const data = await api("/ralph/plans?project=" + encodeURIComponent(project));
          const plans = data.plans || [];
          if (plans.length === 0) {
            planSel.innerHTML = '<option value="">no .md files found</option>';
          } else {
            planSel.innerHTML = plans.map(p => '<option value="' + esc(p) + '">' + esc(p) + '</option>').join("");
          }
        } catch {
          planSel.innerHTML = '<option value="">failed to load plans</option>';
        }
      }

      function toggleBranchFields() {
        const checked = document.getElementById("ralph-branch-toggle").checked;
        const fields = document.getElementById("ralph-branch-fields");
        fields.style.display = checked ? "flex" : "none";
        if (checked) {
          loadBranches(document.getElementById("ralph-project-select").value);
        }
      }

      async function loadBranches(project) {
        const sel = document.getElementById("ralph-source-branch");
        if (!project) { sel.innerHTML = '<option value="">select a project first</option>'; return; }
        try {
          const data = await api("/ralph/branches?project=" + encodeURIComponent(project));
          const branches = data.branches || [];
          if (branches.length === 0) {
            sel.innerHTML = '<option value="">no branches found</option>';
          } else {
            sel.innerHTML = branches.map(b => '<option value="' + esc(b) + '"' + (b === data.current ? ' selected' : '') + '>' + esc(b) + '</option>').join("");
            // Default to main/master if available
            const defaultBranch = branches.find(b => b === "main") || branches.find(b => b === "master");
            if (defaultBranch) sel.value = defaultBranch;
          }
        } catch {
          sel.innerHTML = '<option value="">not a git repo</option>';
        }
      }

      async function startRalph() {
        const project = document.getElementById("ralph-project-select").value;
        const iterations = parseInt(document.getElementById("ralph-iterations-input").value) || 5;
        const planFile = document.getElementById("ralph-plan-select").value || undefined;
        const agent = document.getElementById("ralph-agent-select").value;
        if (!project) { alert("select a project"); return; }
        if (!planFile) { alert("select a plan file"); return; }

        // Warn if plan has no numbered tasks — worker will auto-number
        let format = false;
        try {
          const tc = await api("/ralph/task-count?project=" + encodeURIComponent(project) + "&plan=" + encodeURIComponent(planFile));
          if (tc.total === 0) {
            if (!confirm("No numbered tasks in " + planFile + ". Ralph will number them automatically. Continue?")) return;
            format = true;
          }
        } catch {}

        const body = { project, iterations, planFile, agent, format };
        const branchToggle = document.getElementById("ralph-branch-toggle").checked;
        if (branchToggle) {
          const newBranch = document.getElementById("ralph-branch-name").value.trim();
          const sourceBranch = document.getElementById("ralph-source-branch").value;
          if (!newBranch) { alert("enter a branch name"); return; }
          body.newBranch = newBranch;
          body.sourceBranch = sourceBranch;
        }

        try {
          const data = await api("/ralph/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (data.error) { alert(data.error); return; }
          currentRalphProject = project;
          showView("ralph");
        } catch (e) {
          alert("failed to start: " + e.message);
        }
      }

      function restartRalph(planFile) {
        currentRalphPlanFile = planFile || "";
        showView("ralph-start");
      }

      async function dismissRalph(project, event) {
        event.stopPropagation();
        if (!confirm("delete plan file for " + project + "?")) return;
        try {
          await api("/ralph/dismiss", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project }),
          });
          loadRalphLoops();
        } catch (e) {
          alert("failed to dismiss: " + e.message);
        }
      }

      // ── Sessions ──

      // Shared session groups cache for switcher reuse
      let lastSessionGroups = [];

      function renderGroupHtml(g) {
        const mUrl = esc(g.machine.url);
        const mUrlAttr = escAttr(g.machine.url);
        const mName = esc(g.machine.name);
        const statusDot = g.online ? "green" : (g.pending ? "gray" : "red");
        const versionWarning = g.outdated ? `<span style="color:#ff6600;margin-left:6px;font-size:11px;padding:3px 8px;border:1px solid #00ff41;border-radius:2px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:1px" onclick="event.stopPropagation();alert('Running v${escAttr(g.machine.version || "?")} — newer version available on another machine')">⚠ UPDATE</span>` : "";
        let html = `<div class="machine-group" data-machine="${mUrl}">`;
        html += `<div class="machine-header"><div class="dot ${statusDot}"></div>${mName}${versionWarning}<button class="machine-add-btn" onclick="showProjectPicker('${mUrlAttr}')">+</button></div>`;
        if (g.pending) {
          html += `<div style="padding:4px 4px;color:#555;font-size:11px">Connecting...</div>`;
        } else if (g.online && g.sessions.length) {
          html += g.sessions.map(s => {
            const lastLine = s.lastLine || "";
            const needsAttention = ATTENTION_PATTERNS.some(p => p.test(lastLine));
            const dotClass = needsAttention ? "yellow" : "green";
            return `<div class="card" onclick="openSession('${escAttr(s.name)}', '${mUrlAttr}')">
              <div class="dot ${dotClass}"></div>
              <div class="card-info">
                <div class="card-machine">${mName}</div>
                <div class="card-name">${esc(s.name)}</div>
                <div class="card-preview">${esc(lastLine)}</div>
              </div>
              <button class="kill-btn" onclick="killSession('${escAttr(s.name)}', event, '${mUrlAttr}')">&times;</button>
            </div>`;
          }).join("");
        } else if (!g.online) {
          html += `<div style="padding:4px 4px;color:#555;font-size:11px">Offline</div>`;
        }
        html += `</div>`;
        return html;
      }

      function renderSingleMachineHtml(g) {
        let html = '<div class="new-btn" onclick="showProjectPicker()">+ New Session</div>';
        if (g.online && g.sessions.length) {
          html += g.sessions.map(s => {
            const lastLine = s.lastLine || "";
            const needsAttention = ATTENTION_PATTERNS.some(p => p.test(lastLine));
            const dotClass = needsAttention ? "yellow" : "green";
            return `<div class="card" onclick="openSession('${escAttr(s.name)}')">
              <div class="dot ${dotClass}"></div>
              <div class="card-info">
                <div class="card-name">${esc(s.name)}</div>
                <div class="card-preview">${esc(lastLine)}</div>
              </div>
              <button class="kill-btn" onclick="killSession('${escAttr(s.name)}', event)">&times;</button>
            </div>`;
          }).join("");
        }
        return html;
      }

      function fetchMachine(machineUrl, machineMeta) {
        return Promise.all([api("/sessions", undefined, machineUrl || undefined), api("/info", undefined, machineUrl || undefined)])
          .then(([d, info]) => ({
            machine: { ...machineMeta, url: machineUrl, version: info.version || "", name: info.name || machineMeta.name },
            sessions: d.sessions || [], online: true, pending: false,
          }))
          .catch(() => ({
            machine: { ...machineMeta, url: machineUrl, version: "" },
            sessions: [], online: false, pending: false,
          }));
      }

      let firstLoad = true;
      let lastSessionsHtml = "";

      async function loadSessions() {
        const el = document.getElementById("session-list");
        const machines = getMachines();
        const multiMachine = machines.length > 0;

        // Single-machine: just fetch and render
        if (!multiMachine) {
          const g = await fetchMachine("", { name: selfName || "this machine" });
          lastSessionGroups = [g];
          allSessions = g.sessions.map(s => ({ ...s, machineUrl: "", machineName: g.machine.name }));
          const html = renderSingleMachineHtml(g);
          if (html !== lastSessionsHtml) { el.innerHTML = html; lastSessionsHtml = html; }
          firstLoad = false;
          return;
        }

        // Multi-machine
        const allMachines = [
          { url: "", meta: { name: selfName || "this machine" } },
          ...machines.map(m => ({ url: m.url, meta: m })),
        ];

        // Only show placeholders on first load
        if (firstLoad) {
          el.innerHTML = allMachines.map(m =>
            renderGroupHtml({ machine: { ...m.meta, url: m.url }, sessions: [], online: false, pending: true })
          ).join("");
        }

        const groups = new Array(allMachines.length);

        const promises = allMachines.map((m, i) =>
          fetchMachine(m.url, m.meta).then(g => {
            groups[i] = g;
            if (firstLoad) {
              const placeholder = el.querySelector(`[data-machine="${esc(m.url)}"]`);
              if (placeholder) {
                const tmp = document.createElement("div");
                tmp.innerHTML = renderGroupHtml(g);
                placeholder.replaceWith(tmp.firstElementChild);
              }
            }
          })
        );

        await Promise.all(promises);

        // Version outdated check
        const versions = groups.filter(g => g.online && g.machine.version).map(g => g.machine.version);
        const newestVersion = versions.sort((a, b) => b.localeCompare(a, undefined, { numeric: true }))[0] || "";
        if (newestVersion) {
          groups.forEach(g => {
            g.outdated = g.online && g.machine.version !== newestVersion;
          });
        }

        // Sort by number of open terminals (most first)
        groups.sort((a, b) => b.sessions.length - a.sessions.length);

        // Build final HTML, only touch DOM if changed
        const html = groups.map(g => renderGroupHtml(g)).join("");
        if (html !== lastSessionsHtml) {
          el.innerHTML = html;
          lastSessionsHtml = html;
        }

        firstLoad = false;
        lastSessionGroups = groups;
        allSessions = [];
        groups.forEach(g => g.sessions.forEach(s => allSessions.push({ ...s, machineUrl: g.machine.url, machineName: g.machine.name })));
      }

      function openSession(name, machineUrl) {
        currentSession = name;
        currentMachine = machineUrl || "";
        lastRawPane = null;
        useDesktopTerminal = isDesktop() && !machineUrl;
        showView("terminal");
        if (useDesktopTerminal) {
          initDesktopTerminal();
        } else {
          document.getElementById("terminal").textContent = "";
          resizePane();
          startPolling();
        }
      }

      async function resizePane() {
        if (!currentSession) return;
        const term = document.getElementById("terminal");
        const probe = document.createElement("span");
        probe.style.cssText =
          'position:absolute;visibility:hidden;white-space:pre;font-size:12px;line-height:1.4;font-family:inherit';
        probe.textContent = "X";
        document.body.appendChild(probe);
        const charW = probe.offsetWidth;
        const charH = probe.offsetHeight;
        document.body.removeChild(probe);
        if (!charW || !charH) return;
        const cols = Math.floor(term.clientWidth / charW);
        const rows = Math.floor(term.clientHeight / charH);
        if (cols > 0 && rows > 0) {
          await api("/resize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, cols, rows }),
          }, currentMachine);
        }
      }

      // ── Project picker ──

      let projectMachine = ""; // machine URL for project picker context

      async function showProjectPicker(machineUrl) {
        projectMachine = machineUrl || "";
        showView("projects");
        document.getElementById("new-project-name").value = "";
        const el = document.getElementById("project-list");
        el.innerHTML = '<div class="empty">Loading...</div>';

        try {
          const data = await api("/projects", undefined, projectMachine);
          if (!data.projects?.length) {
            el.innerHTML = '<div class="empty">No projects in ~/Dev</div>';
            return;
          }
          el.innerHTML = data.projects
            .map(
              (p) => `
      <div class="card" onclick="selectProject('${escAttr(p)}')">
        <div class="dot blue"></div>
        <div class="card-name">${esc(p)}</div>
      </div>
    `,
            )
            .join("");
        } catch {
          el.innerHTML = '<div class="empty">Failed to load projects</div>';
        }
      }

      function showTerminalLoading(label) {
        showView("terminal");
        const term = document.getElementById("terminal");
        term.innerHTML = '<span class="loading-text">Starting session in ' + esc(label) + '\u2026</span>';
      }

      let selectedProject = "";
      let isNewProject = false;

      function selectProject(project) {
        selectedProject = project;
        isNewProject = false;
        showAgentPicker();
      }

      function selectNewProject() {
        const input = document.getElementById("new-project-name");
        const name = input.value.trim();
        if (!name) return;
        selectedProject = name;
        isNewProject = true;
        showAgentPicker();
      }

      async function showAgentPicker() {
        showView("agent");
        const el = document.getElementById("agent-list");
        el.innerHTML = '<div class="empty">Loading...</div>';
        try {
          const data = await api("/settings", undefined, projectMachine);
          const presets = Object.entries(data.presets || {});
          const customCmds = data.settings?.customCmds || [];
          let html = presets.map(([label, cmd]) => `
            <div class="card" onclick="createSessionWithAgent('${escAttr(cmd)}')">
              <div class="dot blue"></div>
              <div class="card-name">${esc(label)}</div>
            </div>
          `).join("");
          html += customCmds.map(cmd => `
            <div class="card" onclick="createSessionWithAgent('${escAttr(cmd)}')">
              <div class="dot green"></div>
              <div class="card-name">${esc(cmd)}</div>
            </div>
          `).join("");
          el.innerHTML = html;
        } catch {
          el.innerHTML = '<div class="empty">Failed to load agents</div>';
        }
      }

      async function createSessionWithAgent(cmd) {
        const machine = projectMachine;
        showTerminalLoading(selectedProject);
        try {
          const body = isNewProject
            ? { newProject: selectedProject, cmd }
            : { project: selectedProject, cmd };
          const data = await api("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          }, machine);
          if (data.session) {
            currentSession = data.session;
            currentMachine = machine;
            useDesktopTerminal = isDesktop() && !machine;
            // Refresh session list so switcher has the new session
            await loadSessions();
            loadSessionSwitcher();
            if (useDesktopTerminal) {
              initDesktopTerminal();
            } else {
              resizePane();
              startPolling();
            }
          } else {
            const msg = data.error || "Server returned no session (is wolfpack up to date?)";
            alert("Failed to create session: " + msg);
            showView("sessions");
            loadSessions();
          }
        } catch (e) {
          alert("Failed to create session: " + (e.message || "network error"));
          showView("sessions");
          loadSessions();
        }
      }

      // ── Desktop Terminal (AnsiUp + WebSocket) ──

      function calcTermDimensions(pre) {
        const probe = document.createElement("span");
        probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-size:13px;line-height:1.4;font-family:inherit';
        probe.textContent = "X";
        pre.appendChild(probe);
        const charW = probe.offsetWidth;
        const charH = probe.offsetHeight;
        pre.removeChild(probe);
        if (!charW || !charH) return null;
        const cols = Math.floor(pre.clientWidth / charW);
        const rows = Math.floor(pre.clientHeight / charH);
        return (cols > 0 && rows > 0) ? { cols, rows } : null;
      }

      function initDesktopTerminal() {
        if (desktopWs) return;
        const pre = document.getElementById("desktop-terminal");
        pre.style.display = "block";
        pre.innerHTML = "";
        document.getElementById("terminal").style.display = "none";
        document.getElementById("action-bar").style.display = "none";
        document.getElementById("input-bar").style.display = "none";
        document.getElementById("msg-preview").style.display = "none";

        const ansi = new AnsiUp();
        ansi.use_classes = false;
        desktopAnsiUp = ansi;

        // Connect WebSocket
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = proto + "//" + location.host + "/ws/terminal?session=" + encodeURIComponent(currentSession);
        const ws = new WebSocket(wsUrl);
        desktopWs = ws;
        ws.onopen = () => {
          const dims = calcTermDimensions(pre);
          if (dims) {
            ws.send(JSON.stringify({ type: "resize", cols: dims.cols, rows: dims.rows }));
          }
        };

        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "output") {
              desktopRawAnsi = msg.data;
              if (searchActive && searchTerm) {
                applySearchHighlights();
              } else {
                pre.innerHTML = ansi.ansi_to_html(msg.data);
              }
            }
          } catch {}
        };

        ws.onclose = () => {
          const statusEl = document.getElementById("conn-status");
          if (statusEl && currentView === "terminal") statusEl.style.display = "block";
        };

        // Keyboard input → WebSocket (tmux-compatible key names)
        const onKeyDown = (e) => {
          if (!desktopWs || desktopWs.readyState !== WebSocket.OPEN) return;

          // Ctrl+F / Cmd+F → open search bar (not sent to tmux)
          if (e.key.toLowerCase() === "f" && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
            e.preventDefault();
            if (!searchActive) toggleSearch();
            return;
          }

          // Escape closes search even when focus is outside the input
          if (searchActive) {
            if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
            return;
          }
          // Skip when an input/textarea/select is focused
          const tag = document.activeElement && document.activeElement.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
          if (document.activeElement && document.activeElement.isContentEditable) return;

          // Ctrl+key → tmux C-x notation
          if (e.ctrlKey && !e.metaKey && e.key.length === 1) {
            const ch = e.key.toLowerCase();
            if (ch >= "a" && ch <= "z") {
              e.preventDefault();
              desktopWs.send(JSON.stringify({ type: "key", key: "C-" + ch }));
              return;
            }
          }

          // Special keys → tmux key names
          const keyMap = {
            Enter: "Enter", Escape: "Escape", Backspace: "BSpace",
            Tab: "Tab", Delete: "DC",
            ArrowUp: "Up", ArrowDown: "Down", ArrowLeft: "Left", ArrowRight: "Right",
            Home: "Home", End: "End", PageUp: "PPage", PageDown: "NPage",
          };
          if (keyMap[e.key]) {
            e.preventDefault();
            desktopWs.send(JSON.stringify({ type: "key", key: keyMap[e.key] }));
            return;
          }

          // Printable chars → send as literal input
          if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            desktopWs.send(JSON.stringify({ type: "input", data: e.key }));
          }
        };
        document.addEventListener("keydown", onKeyDown);
        pre._onKeyDown = onKeyDown;

        // Paste → send clipboard text to tmux
        const onPaste = (e) => {
          if (!desktopWs || desktopWs.readyState !== WebSocket.OPEN) return;
          if (searchActive) return;
          const text = (e.clipboardData || window.clipboardData).getData("text");
          if (text) {
            e.preventDefault();
            desktopWs.send(JSON.stringify({ type: "input", data: text }));
          }
        };
        document.addEventListener("paste", onPaste);
        pre._onPaste = onPaste;

        // Window resize → recalculate cols/rows
        const onResize = () => {
          if (!desktopWs || desktopWs.readyState !== WebSocket.OPEN) return;
          const dims = calcTermDimensions(pre);
          if (dims) {
            desktopWs.send(JSON.stringify({ type: "resize", cols: dims.cols, rows: dims.rows }));
          }
        };
        window.addEventListener("resize", onResize);
        desktopResizeHandler = onResize;
      }

      function destroyDesktopTerminal() {
        if (desktopWs) {
          desktopWs.close();
          desktopWs = null;
        }
        if (desktopResizeHandler) {
          window.removeEventListener("resize", desktopResizeHandler);
          desktopResizeHandler = null;
        }
        const pre = document.getElementById("desktop-terminal");
        if (pre._onKeyDown) {
          document.removeEventListener("keydown", pre._onKeyDown);
          pre._onKeyDown = null;
        }
        if (pre._onPaste) {
          document.removeEventListener("paste", pre._onPaste);
          pre._onPaste = null;
        }
        pre.style.display = "none";
        pre.innerHTML = "";
        desktopAnsiUp = null;
        desktopRawAnsi = null;
        // Restore mobile element defaults
        document.getElementById("terminal").style.display = "";
        document.getElementById("action-bar").style.display = "";
        document.getElementById("input-bar").style.display = "";
      }

      // ── Terminal ──

      function startPolling() {
        poll();
        schedulePoll();
      }

      function schedulePoll() {
        if (pollTimer) clearTimeout(pollTimer);
        const interval = fastPoll ? 100 : 500;
        pollTimer = setTimeout(() => { poll().then(schedulePoll); }, interval);
      }

      function enterFastPoll() {
        fastPoll = true;
      }

      function stopPolling() {
        if (pollTimer) {
          clearTimeout(pollTimer);
          pollTimer = null;
        }
      }

      let pollFails = 0;

      async function poll() {
        if (!currentSession) return;
        try {
          const data = await api(
            "/poll?session=" + encodeURIComponent(currentSession),
            undefined, currentMachine,
          );
          pollFails = 0;
          const term = document.getElementById("terminal");
          const statusEl = document.getElementById("conn-status");
          if (statusEl) statusEl.style.display = "none";
          if (data.pane != null) {
            const changed = data.pane !== lastRawPane;
            lastRawPane = data.pane;
            if (changed) {
              fastPoll = false;
              // Clear Enter retry if pane changed
              if (enterRetryTimer) {
                clearTimeout(enterRetryTimer);
                enterRetryTimer = null;
              }
              const wasAtBottom =
                term.scrollHeight - term.scrollTop - term.clientHeight < 40;
              if (searchActive && searchTerm) {
                applySearchHighlights();
              } else {
                term.textContent = data.pane;
              }
              if (wasAtBottom) term.scrollTop = term.scrollHeight;
            }
            if (data.pane.trim()) checkForAttention(data.pane);
          }
        } catch {
          pollFails++;
          if (pollFails >= 3) {
            const statusEl = document.getElementById("conn-status");
            if (statusEl) statusEl.style.display = "block";
          }
        }
      }

      let enterRetryTimer = null;

      async function sendMsg() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text || !currentSession) return;
        const saved = text;
        input.value = "";
        autoResizeInput();
        document.getElementById("msg-preview").style.display = "none";

        // Flash send button
        const btn = document.getElementById("send-btn");
        btn.classList.remove("send-flash");
        void btn.offsetWidth; // force reflow
        btn.classList.add("send-flash");

        try {
          await api("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session: currentSession, text: text.replace(/\n/g, " ") }),
          }, currentMachine);
          enterFastPoll();

          // Enter retry: if pane hasn't changed within 800ms, Enter may have been dropped.
          // Timer is cleared on any pane change (in poll()), so this only fires if truly stuck.
          // Scope to the session that was active at send time to prevent phantom Enter on other sessions.
          if (enterRetryTimer) clearTimeout(enterRetryTimer);
          const retrySession = currentSession;
          const retryMachine = currentMachine;
          enterRetryTimer = setTimeout(() => {
            if (currentSession === retrySession && currentMachine === retryMachine) {
              sendKey("Enter");
            }
            enterRetryTimer = null;
          }, 800);
        } catch {
          input.value = saved;
          autoResizeInput();
        }
      }

      function updatePreview() {
        const input = document.getElementById("msg-input");
        const preview = document.getElementById("msg-preview");
        if (input.scrollWidth > input.clientWidth) {
          preview.textContent = input.value;
          preview.style.display = "block";
        } else {
          preview.style.display = "none";
        }
      }

      async function sendKey(key) {
        if (!currentSession) return;
        await api("/key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: currentSession, key }),
        }, currentMachine);
        enterFastPoll();
      }

      async function killSession(name, e, machineUrl) {
        e.stopPropagation();
        if (!confirm(`Kill session "${name}"?`)) return;
        await api("/kill", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session: name }),
        }, machineUrl || "");
        loadSessions();
      }

      function loadSessionSwitcher() {
        const machines = getMachines();
        const groups = lastSessionGroups;
        const sel = document.getElementById("session-switcher");
        let opts = "";
        for (const g of groups) {
          for (const s of g.sessions) {
            const val = g.machine.url ? g.machine.url + "|" + s.name : s.name;
            const label = s.name;
            const selected = s.name === currentSession && g.machine.url === currentMachine ? "selected" : "";
            opts += `<option value="${esc(val)}" ${selected}>${esc(label)}</option>`;
          }
        }
        sel.innerHTML = opts;
        // Set value programmatically — webkit ignores selected attr via innerHTML
        sel.value = currentMachine ? currentMachine + "|" + currentSession : currentSession;
      }

      function switchSession(val) {
        let name, machineUrl;
        // Values with | are remote: "url|sessionName"
        const pipeIdx = val.indexOf("|");
        if (pipeIdx !== -1) {
          machineUrl = val.substring(0, pipeIdx);
          name = val.substring(pipeIdx + 1);
        } else {
          machineUrl = "";
          name = val;
        }
        if (name === currentSession && machineUrl === currentMachine) return;
        // Tear down current mode
        if (useDesktopTerminal) {
          destroyDesktopTerminal();
        } else {
          stopPolling();
        }
        currentSession = name;
        currentMachine = machineUrl;
        const _title = document.getElementById("header-title");
        _title.textContent = name;
        _title.style.display = "";
        document.getElementById("session-switcher").style.display = "none";
        useDesktopTerminal = isDesktop() && !machineUrl;
        if (useDesktopTerminal) {
          initDesktopTerminal();
        } else {
          document.getElementById("terminal").textContent = "";
          resizePane();
          startPolling();
        }
      }

      // ── Notifications ──

      let notificationsEnabled = false;


      function requestNotifications() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission().then((p) => {
            notificationsEnabled = p === "granted";
          });
        } else if (
          "Notification" in window &&
          Notification.permission === "granted"
        ) {
          notificationsEnabled = true;
        }
      }

      const ATTENTION_PATTERNS = [
        /\? \(y\/n\)/i,
        /\[Y\/n\]/i,
        /\[yes\/no\]/i,
        /Do you want to/i,
        /Press Enter/i,
        /permission/i,
        /approve/i,
        /waiting for/i,
        /Error:/i,
        /error\[/i,
        /failed/i,
        /❌/,
      ];

      // Per-session notification tracking: { "machineUrl|sessionName": "lastNotifiedText" }
      const notifiedSessions = {};

      function checkForAttention(paneText) {
        if (!notificationsEnabled || !currentSession) return;
        if (document.visibilityState === "visible") return;
        checkSessionAttention(currentSession, currentMachine, paneText);
      }

      function checkSessionAttention(sessionName, machineUrl, paneText) {
        if (!notificationsEnabled) return;
        if (document.visibilityState === "visible") return;

        const lastLines = paneText.trimEnd().split("\n").slice(-5).join("\n");
        const key = (machineUrl || "") + "|" + sessionName;
        if (notifiedSessions[key] === lastLines) return;

        for (const pat of ATTENTION_PATTERNS) {
          if (pat.test(lastLines)) {
            notifiedSessions[key] = lastLines;
            const machineName = machineUrl
              ? (getMachines().find(m => m.url === machineUrl)?.name || "remote")
              : (selfName || "local");
            const title = getMachines().length > 0
              ? `${machineName}: ${sessionName}`
              : `Wolfpack: ${sessionName}`;
            new Notification(title, {
              body: lastLines.slice(-120),
              tag: "wolfpack-" + key,
            });
            navigator.vibrate?.([200, 100, 200]);
            return;
          }
        }
        // No pattern matched — clear so we can re-notify if it matches again later
        delete notifiedSessions[key];
      }

      // Background attention check for ALL sessions (runs regardless of current view)
      let bgAttentionTimer = null;

      async function checkAllSessionsAttention() {
        if (!notificationsEnabled) return;
        if (document.visibilityState === "visible") return;
        try {
          const machines = getMachines();
          const fetches = [
            api("/sessions").then(d => ({ sessions: d.sessions || [], machineUrl: "" })).catch(() => null),
            ...machines.map(m =>
              api("/sessions", undefined, m.url).then(d => ({ sessions: d.sessions || [], machineUrl: m.url })).catch(() => null)
            ),
          ];
          const results = await Promise.all(fetches);
          for (const r of results) {
            if (!r) continue;
            for (const s of r.sessions) {
              // Skip current session — poll() already handles it
              if (s.name === currentSession && r.machineUrl === currentMachine) continue;
              if (s.lastLine) checkSessionAttention(s.name, r.machineUrl, s.lastLine);
            }
          }
        } catch {}
      }

      function startBgAttention() {
        if (bgAttentionTimer) return;
        bgAttentionTimer = setInterval(checkAllSessionsAttention, 10000);
      }

      function stopBgAttention() {
        if (bgAttentionTimer) { clearInterval(bgAttentionTimer); bgAttentionTimer = null; }
      }

      requestNotifications();
      startBgAttention();

      // Pause bg attention when visible, resume when hidden; re-poll terminal on foreground
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          stopBgAttention();
          // Restart session refresh if on sessions view
          if (currentView === "sessions" && !sessionRefreshTimer) {
            loadSessions();
            sessionRefreshTimer = setInterval(loadSessions, 5000);
          }
          if (currentSession && currentView === "terminal") {
            poll();
            enterFastPoll();
            schedulePoll();
          }
        } else {
          // Stop session refresh when backgrounded — bgAttention covers notifications
          if (sessionRefreshTimer) {
            clearInterval(sessionRefreshTimer);
            sessionRefreshTimer = null;
          }
          startBgAttention();
        }
      });

      // Dismiss preview when tapping terminal area
      document.getElementById("terminal").addEventListener("click", () => {
        document.getElementById("msg-preview").style.display = "none";
      });

      // Auto-resize textarea as content grows
      function autoResizeInput() {
        const ta = document.getElementById("msg-input");
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      }

      const msgInput = document.getElementById("msg-input");
      msgInput.addEventListener("input", () => {
        autoResizeInput();
        updatePreview();
      });
      // Mobile: Enter adds newline, Shift+Enter submits
      // Desktop: Enter submits, Shift+Enter adds newline
      const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      msgInput.addEventListener("keydown", (e) => {
        if (currentView !== "terminal") return;
        const empty = !msgInput.value.trim();
        if (e.key === "Enter") {
          if (isMobile) {
            // Mobile: Enter adds newline, Shift+Enter submits
            if (e.shiftKey) {
              e.preventDefault();
              if (empty) sendKey("Enter"); else sendMsg();
            }
            // else: let Enter add newline naturally
          } else {
            // Desktop: Enter submits, Shift+Enter adds newline
            if (!e.shiftKey) {
              e.preventDefault();
              if (empty) sendKey("Enter"); else sendMsg();
            }
          }
        } else if (e.key === "ArrowUp" && empty) {
          e.preventDefault();
          sendKey("Up");
        } else if (e.key === "ArrowDown" && empty) {
